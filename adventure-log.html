<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c20">
<title>Adventure Log</title>
<style>
:root {
  /* Darker, more authentic RPG blues */
  --bg: #0b112c;
  --bg-window: #040814; 
  --border-light: #ffffff;
  --text: #f8f8f8;
  --text-dim: #b0b8d0;
  --text-gold: #f8d848;
  --text-blue: #68c0f8;
  --gold-glow: rgba(248, 216, 72, 0.15);
  --green: #68e868;
  --red: #f87070;
  --red-glow: rgba(248, 112, 112, 0.15);
  --font: 'Courier New', 'Courier', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
  min-height: 100vh; min-height: 100dvh; 
  background: var(--bg); color: var(--text); 
  font-family: var(--font); max-width: 480px; 
  margin: 0 auto; padding: 0 0 100px 0; 
  -webkit-font-smoothing: antialiased; 
  /* Classic retro text shadow for readability */
  text-shadow: 1px 1px 0px #000;
}

/* Authentic Double-Border RPG Window */
.dq-window { 
  position: relative; 
  background: var(--bg-window); 
  border: 3px solid var(--border-light); 
  border-radius: 6px; 
  padding: 16px; 
  box-shadow: inset 0 0 0 2px var(--bg-window), inset 0 0 0 4px var(--border-light), 0 4px 15px rgba(0,0,0,0.5); 
}

.header { display: flex; align-items: center; gap: 16px; padding: 24px 16px 12px; }
.header-creature { width: 48px; height: 48px; flex-shrink: 0; cursor: pointer; animation: float 3s ease-in-out infinite; }
.header-creature svg { width: 100%; height: 100%; filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.5)); }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

.header-info { flex: 1; }
.header-title { font-size: 20px; font-weight: bold; color: var(--text-gold); letter-spacing: 1.5px; margin-bottom: 4px;}
.header-date { font-size: 12px; color: var(--text-dim); }

.stats-row { display: flex; justify-content: space-between; padding: 0 16px 16px; font-size: 12px; color: var(--text-dim); border-bottom: 2px dashed rgba(255,255,255,0.1); margin-bottom: 16px;}
.stats-row .num { color: var(--text-gold); font-weight: bold; }

.nav { display: flex; gap: 8px; padding: 0 16px 16px; }
.nav-btn { flex: 1; padding: 12px 4px; border: 2px solid var(--border-light); border-radius: 4px; background: var(--bg-window); color: var(--text-dim); font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }
.nav-btn.active { background: var(--gold-glow); color: var(--text-gold); box-shadow: inset 0 0 10px rgba(240,216,96,0.2); }

.section { padding: 0 16px; }
.hidden { display: none !important; }

textarea { width: 100%; padding: 16px; border: 2px solid var(--border-light); border-radius: 4px; background: var(--bg-window); color: var(--text); font-family: var(--font); font-size: 15px; outline: none; resize: vertical; line-height: 1.6; transition: all 0.2s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); text-shadow: none; }
textarea:focus { border-color: var(--text-gold); }
textarea::placeholder { color: #4a5480; }

.label { display: block; font-size: 13px; color: var(--text-gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;}
.field { margin-bottom: 16px; }

.submit-btn { width: 100%; padding: 16px; border: 2px solid var(--border-light); border-radius: 4px; background: linear-gradient(180deg, #182868, #0b112c); color: var(--text-gold); font-family: var(--font); font-size: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; margin-top: 8px;}
.submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.submit-btn:not(:disabled):active { transform: scale(0.97); background: #182868; }

.cancel-btn { width: 100%; padding: 12px; border: 2px dashed var(--red); border-radius: 4px; background: var(--red-glow); color: var(--red); font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 12px; display: none; text-transform: uppercase;}
.cancel-btn.visible { display: block; }

.log-card { margin-bottom: 16px; padding: 16px; }
.lc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px;}
.lc-entry-num { font-size: 14px; font-weight: bold; color: var(--text-gold); }
.lc-date { font-size: 12px; color: var(--text-dim); }
.lc-body { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; color: #d0d0d0;}

/* Action Buttons */
.lc-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; padding-top: 12px; }
.lc-btn { padding: 8px 12px; border: 2px solid var(--border-light); border-radius: 4px; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;}
.lc-btn:active { background: var(--border-light); color: var(--bg-window); }
.lc-btn.read-btn { border-color: var(--text-gold); color: var(--text-gold); }

.search-bar { margin-bottom: 16px; }
.search-bar input { width: 100%; padding: 12px 16px; border: 2px solid var(--border-light); border-radius: 4px; background: var(--bg-window); color: var(--text); font-family: var(--font); font-size: 14px; outline: none; text-shadow: none;}
.search-bar input:focus { border-color: var(--text-gold); }

.empty-state { text-align: center; padding: 48px 16px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; filter: grayscale(100%) opacity(0.5);}
.empty-text { font-size: 15px; color: var(--text-dim); font-weight: bold;}

.export-bar { display: flex; gap: 8px; padding: 24px 16px; }
.export-btn { flex: 1; padding: 10px; border: 2px solid rgba(255,255,255,0.3); border-radius: 4px; background: transparent; color: var(--text-dim); font-family: var(--font); font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;}

/* Overlays */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: auto; }
.overlay-box { max-width: 360px; width: 100%; text-align: center; max-height: 85vh; display: flex; flex-direction: column;}
.overlay-box p { font-size: 15px; color: var(--text); margin-bottom: 20px; line-height: 1.6; }

/* Read View Specifics */
.read-content { flex: 1; overflow-y: auto; text-align: left; margin-bottom: 20px; padding-right: 8px; }
.read-content::-webkit-scrollbar { width: 6px; }
.read-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

.overlay-btns { display: flex; gap: 12px; margin-top: auto; }
.overlay-btns button { flex: 1; padding: 12px; border-radius: 4px; font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase;}
.btn-keep { border: 2px solid var(--border-light); background: transparent; color: var(--text); }
.btn-danger { border: 2px solid var(--red); background: var(--red-glow); color: var(--red); }
.btn-primary { width: 100%; padding: 14px; border: 2px solid var(--border-light); border-radius: 4px; background: linear-gradient(180deg, #182868, #0b112c); color: var(--text-gold); font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

.success-box { padding: 24px; }
.success-text { font-size: 16px; color: var(--text); line-height: 1.8; text-align: center; margin-bottom: 24px; }
.success-text .hl { color: var(--text-gold); font-weight: bold;}
.success-text .gr { color: var(--green); font-weight: bold;}

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--bg-window); border: 2px solid var(--border-light); color: var(--text-gold); padding: 12px 24px; border-radius: 4px; font-family: var(--font); font-size: 14px; font-weight: bold; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.log-card { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-creature" id="creatureWrap" onclick="spawnCreature()"></div>
  <div class="header-info">
    <div class="header-title">Adventure Log</div>
    <div class="header-date" id="dateText"></div>
  </div>
</div>

<div class="stats-row">
  <span><span class="num" id="statEntries">0</span> Entries</span>
  <span><span class="num" id="statStreak">0</span> Day Streak</span>
  <span><span class="num" id="statWords">0</span> Words</span>
</div>

<div class="nav">
  <button class="nav-btn active" id="navWrite" onclick="showView('write')">Command</button>
  <button class="nav-btn" id="navLog" onclick="showView('log')">Tome (<span id="entryCount">0</span>)</button>
</div>

<div class="section" id="writeView">
  <div class="dq-window" style="margin-bottom:16px">
    <div class="field" style="margin-bottom:0">
      <div class="label">Thy Thoughts</div>
      <textarea id="journalText" rows="12" placeholder="Write freely, hero. What weighs on thy mind? What happened today? This is thy space."></textarea>
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Record in the Log</button>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelEdit()">Cancel Edit</button>
</div>

<div class="section hidden" id="logView">
  <div class="search-bar"><input type="text" id="searchInput" placeholder="Search thy adventure log..." oninput="renderLog()"></div>
  <div id="logList"></div>
</div>

<div class="export-bar">
  <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  <button class="export-btn" onclick="exportTXT()">Export Text</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">Import File</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="overlay" id="successOverlay">
  <div class="overlay-box dq-window success-box">
    <div class="success-text" id="successText"></div>
    <button class="btn-primary" onclick="closeSuccess()">Continue</button>
  </div>
</div>

<div class="overlay" id="delOverlay">
  <div class="overlay-box dq-window">
    <p>Art thou sure thou wisheth to erase this page from the log entirely?</p>
    <div class="overlay-btns">
      <button class="btn-keep" onclick="closeDelete()">Nay</button>
      <button class="btn-danger" id="delConfirmBtn">Aye</button>
    </div>
  </div>
</div>

<div class="overlay" id="readOverlay">
  <div class="overlay-box dq-window">
    <div class="lc-date" id="readDate" style="text-align: left; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 8px;"></div>
    <div class="lc-body read-content" id="readBody"></div>
    <button class="btn-primary" onclick="closeRead()">Close Tome</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const STORAGE_KEY='adventure-log-entries';
let entries=[];
let state={editingId:null};
let pendingDeleteId=null;

function spawnCreature(){const c=CREATURES[Math.floor(Math.random()*CREATURES.length)];document.getElementById('creatureWrap').innerHTML=c.svg;}

function init(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r)entries=JSON.parse(r);}catch(e){}
  document.getElementById('dateText').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  spawnCreature();updateUI();
}

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(entries));}

function updateUI(){
  document.getElementById('entryCount').textContent=entries.length;
  document.getElementById('statEntries').textContent=entries.length;
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(entries.some(e=>new Date(e.date).toDateString()===d.toDateString()))streak++;else break;}
  document.getElementById('statStreak').textContent=streak;
  document.getElementById('statStreak').style.color=streak>=7?'var(--green)':'var(--text-gold)';
  const words=entries.reduce((s,e)=>s+(e.text||'').split(/\s+/).filter(w=>w).length,0);
  document.getElementById('statWords').textContent=words>999?(words/1000).toFixed(1)+'k':words;
  document.getElementById('submitBtn').textContent=state.editingId?'Save Changes':'Record in the Log';
  const c=document.getElementById('cancelBtn');if(state.editingId)c.classList.add('visible');else c.classList.remove('visible');
}

function resetForm(){state={editingId:null};document.getElementById('journalText').value='';updateUI();}

function handleSubmit(){
  const text=document.getElementById('journalText').value.trim();
  if(!text){showToast('Write something first, hero!');return;}
  const existing=state.editingId?entries.find(e=>e.id===state.editingId):null;
  const entry={id:state.editingId||Date.now(),date:existing?existing.date:new Date().toISOString(),text};
  if(state.editingId)entries=entries.map(e=>e.id===state.editingId?entry:e);
  else entries.push(entry);
  entries.sort((a,b)=>new Date(a.date)-new Date(b.date));save();
  const wasEditing=!!state.editingId;resetForm();updateUI();
  if(wasEditing){showToast('Entry updated!');showView('log');}
  else{
    const msg=SAVE_MESSAGES[Math.floor(Math.random()*SAVE_MESSAGES.length)];
    document.getElementById('successText').innerHTML=msg.replace(/\n/g,'<br>');
    document.getElementById('successOverlay').classList.add('open');
  }
}

function cancelEdit(){resetForm();}

function editEntry(id){const e=entries.find(x=>x.id===id);if(!e)return;state.editingId=e.id;document.getElementById('journalText').value=e.text||'';showView('write');updateUI();}

function requestDelete(id){pendingDeleteId=id;document.getElementById('delOverlay').classList.add('open');document.getElementById('delConfirmBtn').onclick=()=>{entries=entries.filter(e=>e.id!==pendingDeleteId);save();closeDelete();renderLog();updateUI();showToast('Page erased from history.');};}

function closeDelete(){document.getElementById('delOverlay').classList.remove('open');pendingDeleteId=null;}
function closeSuccess(){document.getElementById('successOverlay').classList.remove('open');}

/* NEW: Read functions */
function readEntry(id){
  const e=entries.find(x=>x.id===id);
  if(!e)return;
  document.getElementById('readDate').textContent=new Date(e.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('readBody').innerHTML=escHtml(e.text).replace(/\n/g,'<br>');
  document.getElementById('readOverlay').classList.add('open');
}
function closeRead(){document.getElementById('readOverlay').classList.remove('open');}

function showView(v){
  ['writeView','logView'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  ['navWrite','navLog'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(v==='write'){document.getElementById('writeView').classList.remove('hidden');document.getElementById('navWrite').classList.add('active');}
  else{document.getElementById('logView').classList.remove('hidden');document.getElementById('navLog').classList.add('active');renderLog();}
}

function renderLog(){
  const wrap=document.getElementById('logList');
  const query=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  let filtered=[...entries].reverse();
  if(query)filtered=filtered.filter(e=>(e.text||'').toLowerCase().includes(query));
  
  if(!filtered.length){
    wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-text">${query?'No matching entries found.':'The adventure log is empty.'}</div><div class="empty-sub" style="margin-top:8px;">${query?'Try seeking different words.':'Begin thy tale, hero.'}</div></div>`;
    return;
  }
  
  let html='';
  filtered.forEach((entry,i)=>{
    const dateStr=new Date(entry.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const num=entries.indexOf(entry)+1;
    // Keep preview short for the card view
    const preview=(entry.text||'').length>100?entry.text.slice(0,100)+'...':entry.text;
    
    html+=`
      <div class="log-card dq-window" style="animation-delay:${i*0.04}s">
        <div class="lc-top">
          <div class="lc-entry-num">Day ${num}</div>
          <div class="lc-date">${dateStr}</div>
        </div>
        <div class="lc-body">${escHtml(preview)}</div>
        <div class="lc-actions">
          <button class="lc-btn read-btn" onclick="readEntry(${entry.id})">📖 Read</button>
          <button class="lc-btn" onclick="editEntry(${entry.id})">✏️ Edit</button>
          <button class="lc-btn" onclick="requestDelete(${entry.id})">Erase</button>
        </div>
      </div>`;
  });
  wrap.innerHTML=html;
}

function exportJSON(){if(!entries.length){showToast('No pages to export!');return;}dl(JSON.stringify(entries,null,2),'adventure-log-'+iso()+'.json','application/json');showToast('Sacred tome exported!');}
function exportTXT(){if(!entries.length){showToast('No pages to export!');return;}const txt=entries.map(e=>{const d=new Date(e.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});return'═══ '+d+' ═══\n\n'+e.text+'\n';}).join('\n\n');dl(txt,'adventure-log-'+iso()+'.txt','text/plain');showToast('Sacred tome exported!');}
function dl(c,n,t){const b=new Blob([c],{type:t});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);}
function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const imp=JSON.parse(e.target.result);if(!Array.isArray(imp))throw 0;entries=imp;save();updateUI();showToast(entries.length+' pages restored!');}catch(err){showToast('The ancient magic failed. (Import error)');}};reader.readAsText(file);event.target.value='';}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function iso(){return new Date().toISOString().slice(0,10);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
</body>
</html>
