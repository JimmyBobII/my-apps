<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101848">
<title>Adventure Log</title>
<style>
:root {
  --bg: #101848;
  --bg-window: #142058;
  --border-outer: #f8f0e0;
  --border-inner: #c8b878;
  --border-dark: #485090;
  --text: #f8f8f8;
  --text-dim: #a0a8d0;
  --text-gold: #f8d848;
  --text-blue: #68c0f8;
  --gold-glow: rgba(248, 216, 72, 0.12);
  --green: #68e868;
  --red: #f87070;
  --red-glow: rgba(248, 112, 112, 0.12);
  --font: 'Courier New', 'Courier', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; min-height: 100dvh; background: var(--bg); color: var(--text); font-family: var(--font); max-width: 480px; margin: 0 auto; padding: 0 0 100px 0; -webkit-font-smoothing: antialiased; }
.dq-window { position: relative; background: var(--bg-window); border: 3px solid var(--border-outer); border-radius: 8px; padding: 16px; box-shadow: inset 0 0 0 2px var(--border-dark), 0 0 20px rgba(240,216,96,0.06); }
.dq-window::before { content: ''; position: absolute; inset: 2px; border: 1px solid var(--border-inner); border-radius: 5px; pointer-events: none; }
.header { display: flex; align-items: center; gap: 12px; padding: 20px 16px 8px; }
.header-creature { width: 42px; height: 42px; flex-shrink: 0; cursor: pointer; animation: float 3s ease-in-out infinite; }
.header-creature svg { width: 100%; height: 100%; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.header-info { flex: 1; }
.header-title { font-size: 17px; font-weight: bold; color: var(--text-gold); letter-spacing: 1.5px; }
.header-date { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.stats-row { display: flex; gap: 0; padding: 0 16px 12px; font-size: 11px; color: var(--text-dim); }
.stats-row span { margin-right: 14px; }
.stats-row .num { color: var(--text-gold); font-weight: bold; }

.nav { display: flex; gap: 4px; padding: 12px 16px; }
.nav-btn { flex: 1; padding: 10px 4px; border: 2px solid var(--border-dark); border-radius: 4px; background: var(--bg-window); color: var(--text-dim); font-family: var(--font); font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.3px; transition: all 0.15s; }
.nav-btn.active { background: var(--gold-glow); border-color: var(--border-outer); color: var(--text-gold); box-shadow: 0 0 10px rgba(240,216,96,0.1); }
.nav-cnt { font-size: 9px; opacity: 0.7; }
.section { padding: 0 16px; }
.hidden { display: none !important; }
textarea { width: 100%; padding: 14px; border: 2px solid var(--border-inner); border-radius: 4px; background: var(--bg-window); color: var(--text); font-family: var(--font); font-size: 14px; outline: none; resize: vertical; line-height: 1.7; transition: border-color 0.2s; }
textarea:focus { border-color: var(--border-outer); }
textarea::placeholder { color: #6068a0; }
.label { display: block; font-size: 11px; color: var(--text-gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.field { margin-bottom: 16px; }
.submit-btn { width: 100%; padding: 14px; border: 2px solid var(--border-outer); border-radius: 4px; background: linear-gradient(180deg, #283880, #182058); color: var(--text-gold); font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 16px rgba(240,216,96,0.08); transition: all 0.2s; }
.submit-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
.submit-btn:not(:disabled):active { transform: scale(0.97); }
.cancel-btn { width: 100%; padding: 10px; border: 1px solid var(--border-dark); border-radius: 4px; background: transparent; color: var(--text-dim); font-family: var(--font); font-size: 12px; cursor: pointer; margin-top: 8px; display: none; }
.cancel-btn.visible { display: block; }
.log-card { margin-bottom: 10px; padding: 14px; }
.lc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.lc-entry-num { font-size: 12px; font-weight: bold; color: var(--text-gold); }
.lc-date { font-size: 11px; color: var(--text-dim); }
.lc-body { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }
.lc-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
.lc-btn { padding: 4px 10px; border: 1px solid var(--border-dark); border-radius: 3px; background: transparent; color: var(--text-dim); font-family: var(--font); font-size: 11px; cursor: pointer; }
.lc-btn:active { background: rgba(255,255,255,0.05); }
.search-bar { margin-bottom: 12px; }
.search-bar input { width: 100%; padding: 10px 12px; border: 2px solid var(--border-dark); border-radius: 4px; background: var(--bg-window); color: var(--text); font-family: var(--font); font-size: 12px; outline: none; }
.search-bar input:focus { border-color: var(--border-inner); }
.search-bar input::placeholder { color: #6068a0; }
.empty-state { text-align: center; padding: 36px 16px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty-text { font-size: 13px; color: var(--text-dim); }
.empty-sub { font-size: 10px; color: #6068a0; margin-top: 4px; }
.export-bar { display: flex; gap: 6px; padding: 14px 16px; }
.export-btn { flex: 1; padding: 9px; border: 1px solid var(--border-dark); border-radius: 4px; background: var(--bg-window); color: var(--text-dim); font-family: var(--font); font-size: 11px; font-weight: bold; cursor: pointer; }
.export-btn:active { background: rgba(255,255,255,0.05); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: auto; }
.overlay-box { max-width: 320px; width: 100%; text-align: center; }
.overlay-box p { font-size: 13px; color: var(--text); margin-bottom: 16px; line-height: 1.5; }
.overlay-btns { display: flex; gap: 8px; }
.overlay-btns button { flex: 1; padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px; font-weight: bold; cursor: pointer; }
.btn-keep { border: 1px solid var(--border-dark); background: transparent; color: var(--text-dim); }
.btn-danger { border: 2px solid var(--red); background: var(--red-glow); color: var(--red); }
.success-box { padding: 20px; }
.success-text { font-size: 14px; color: var(--text); line-height: 1.7; text-align: left; margin-bottom: 14px; }
.success-text .hl { color: var(--text-gold); }
.success-text .gr { color: var(--green); }
.btn-primary { width: 100%; padding: 12px; border: 2px solid var(--border-outer); border-radius: 4px; background: linear-gradient(180deg, #283880, #182058); color: var(--text-gold); font-family: var(--font); font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--bg-window); border: 2px solid var(--border-outer); color: var(--text-gold); padding: 8px 18px; border-radius: 4px; font-family: var(--font); font-size: 13px; font-weight: bold; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.log-card { animation: fadeUp 0.25s ease both; }
</style>
</head>
<body>
<div class="header">
  <div class="header-creature" id="creatureWrap" onclick="spawnCreature()"></div>
  <div class="header-info">
    <div class="header-title">Adventure Log</div>
    <div class="header-date" id="dateText"></div>
  </div>
</div>
<div class="stats-row">
  <span><span class="num" id="statEntries">0</span> entries</span>
  <span><span class="num" id="statStreak">0</span> day streak</span>
  <span><span class="num" id="statWords">0</span> words</span>
</div>

<div class="nav">
  <button class="nav-btn active" id="navWrite" onclick="showView('write')">Write</button>
  <button class="nav-btn" id="navLog" onclick="showView('log')">Log <span class="nav-cnt" id="entryCount">0</span></button>
</div>
<div class="section" id="writeView">
  <div class="dq-window" style="margin-bottom:14px">
    <div class="field" style="margin-bottom:0">
      <div class="label">Thy Thoughts</div>
      <textarea id="journalText" rows="10" placeholder="Write freely, hero. What weighs on thy mind? What happened today? What art thou grateful for? This is thy space."></textarea>
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Record in the Adventure Log</button>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelEdit()">Cancel Edit</button>
</div>
<div class="section hidden" id="logView">
  <div class="search-bar"><input type="text" id="searchInput" placeholder="Search thy adventure log..." oninput="renderLog()"></div>
  <div id="logList"></div>
</div>
<div class="export-bar">
  <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  <button class="export-btn" onclick="exportTXT()">Export Text</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>
<div class="overlay" id="successOverlay"><div class="overlay-box dq-window success-box">
  <div class="success-text" id="successText"></div>
  <button class="btn-primary" onclick="closeSuccess()">Continue</button>
</div></div>
<div class="overlay" id="delOverlay"><div class="overlay-box dq-window">
  <p>Erase this page from the adventure log?</p>
  <div class="overlay-btns"><button class="btn-keep" onclick="closeDelete()">Nay</button><button class="btn-danger" id="delConfirmBtn">Aye</button></div>
</div></div>
<div class="toast" id="toast"></div>
<script>
const CREATURES=[{name:'Slime',svg:`<svg viewBox="0 0 100 100"><defs><radialGradient id="sg1" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#6DD8FF"/><stop offset="40%" stop-color="#2EA8E0"/><stop offset="75%" stop-color="#1B7CB8"/><stop offset="100%" stop-color="#145F8A"/></radialGradient><radialGradient id="sp1" cx="35%" cy="25%" r="30%"><stop offset="0%" stop-color="rgba(255,255,255,0.4)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient></defs><path d="M50 6C50 6,42 18,30 32C18 46,10 58,10 68C10 82,22 95,50 95C78 95,90 82,90 68C90 58,82 46,70 32C58 18,50 6,50 6Z" fill="url(#sg1)" stroke="#0E5A80" stroke-width="1"/><path d="M50 8C50 8,42 20,32 33C22 46,14 58,14 68C14 78,20 86,34 90C20 82,16 72,20 60C24 48,36 30,50 8Z" fill="url(#sp1)"/><ellipse cx="38" cy="62" rx="7.5" ry="8.5" fill="#fff" stroke="#0E5A80" stroke-width="0.5"/><ellipse cx="39.5" cy="62.5" rx="3.8" ry="4.5" fill="#1A1A2E"/><ellipse cx="40.5" cy="61" rx="1.5" ry="1.8" fill="#fff"/><ellipse cx="62" cy="62" rx="7.5" ry="8.5" fill="#fff" stroke="#0E5A80" stroke-width="0.5"/><ellipse cx="63.5" cy="62.5" rx="3.8" ry="4.5" fill="#1A1A2E"/><ellipse cx="64.5" cy="61" rx="1.5" ry="1.8" fill="#fff"/><path d="M38 76Q42 83,50 84Q58 83,62 76" fill="none" stroke="#0E4A6A" stroke-width="2" stroke-linecap="round"/></svg>`},{name:'Metal Slime',svg:`<svg viewBox="0 0 100 100"><defs><radialGradient id="mg1" cx="38%" cy="32%" r="65%"><stop offset="0%" stop-color="#E8E8F0"/><stop offset="30%" stop-color="#B8B8C8"/><stop offset="60%" stop-color="#888898"/><stop offset="100%" stop-color="#585868"/></radialGradient><radialGradient id="mp1" cx="35%" cy="25%" r="28%"><stop offset="0%" stop-color="rgba(255,255,255,0.55)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient></defs><path d="M50 6C50 6,42 18,30 32C18 46,10 58,10 68C10 82,22 95,50 95C78 95,90 82,90 68C90 58,82 46,70 32C58 18,50 6,50 6Z" fill="url(#mg1)" stroke="#404058" stroke-width="1"/><path d="M50 8C50 8,42 20 ill="url(#bub)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/><circle cx="45" cy="28" r="5" fill="url(#bub)"/><circle cx="70" cy="30" r="4" fill="url(#bub)"/><circle cx="88" cy="56" r="4.5" fill="url(#bub)"/></svg>`},{name:'King Slime',svg:`<svg viewBox="0 0 100 100"><defs><radialGradient id="kg1" cx="45%" cy="40%" r="55%"><stop offset="0%" stop-color="#5CAEF0"/><stop offset="40%" stop-color="#2878D0"/><stop offset="75%" stop-color="#1858A0"/><stop offset="100%" stop-color="#103870"/></radialGradient><linearGradient id="crG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE040"/><stop offset="100%" stop-color="#C89820"/></linearGradient></defs><ellipse cx="50" cy="68" rx="42" ry="28" fill="url(#kg1)" stroke="#0E4878" stroke-width="1"/><path d="M26 42L30 28L36 38L42 22L50 38L58 22L64 38L70 28L74 42Z" fill="url(#crG)" stroke="#987018" stroke-width="0.8"/><rect x="26" y="40" width="48" height="7" rx="1" fill="url(#crG)" stroke="#987018" stroke-width="0.5"/><circle cx="38" cy="43.5" r="2.5" fill="#50B878"/><circle cx="50" cy="43.5" r="2.8" fill="#C850C0"/><circle cx="62" cy="43.5" r="2.5" fill="#50B878"/><path d="M48 22L50 14L52 22" fill="url(#crG)"/><circle cx="50" cy="13" r="2" fill="#FFE040"/><ellipse cx="40" cy="64" rx="6" ry="7" fill="#fff" stroke="#0E4878" stroke-width="0.5"/><ellipse cx="41" cy="64.5" rx="3" ry="3.8" fill="#1A1A2E"/><ellipse cx="41.8" cy="63.2" rx="1.2" ry="1.5" fill="#fff"/><ellipse cx="60" cy="64" rx="6" ry="7" fill="#fff" stroke="#0E4878" stroke-width="0.5"/><ellipse cx="61" cy="64.5" rx="3" ry="3.8" fill="#1A1A2E"/><ellipse cx="61.8" cy="63.2" rx="1.2" ry="1.5" fill="#fff"/><path d="M40 76Q45 82,50 82Q55 82,60 76" fill="#D08070" stroke="#805848" stroke-width="0.5"/></svg>`},{name:'Dracky',svg:`<svg viewBox="0 0 130 100"><defs><radialGradient id="dg1" cx="45%" cy="40%" r="55%"><stop offset="0%" stop-color="#5850A0"/><stop offset="50%" stop-color="#383068"/><stop offset="100%" stop-color="#201840"/></radialGradient></defs><path d="M20 38Q5 28,8 42Q2 50,10 52L18 52Z" fill="url(#dg1)" stroke="#181030" stroke-width="0.8"/><path d="M20 38L8 30Q3 40,10 48L18 52Z" fill="url(#dg1)" stroke="#181030" stroke-width="0.6"/><path d="M110 38Q125 28,122 42Q128 50,120 52L112 52Z" fill="url(#dg1)" stroke="#181030" stroke-width="0.8"/><path d="M110 38L122 30Q127 40,120 48L112 52Z" fill="url(#dg1)" stroke="#181030" stroke-width="0.6"/><ellipse cx="65" cy="50" rx="26" ry="24" fill="url(#dg1)" stroke="#181030" stroke-width="1"/><path d="M55 28Q52 16,48 10" fill="none" stroke="#383068" stroke-width="2.5" stroke-linecap="round"/><path d="M75 28Q78 16,82 10" fill="none" stroke="#383068" stroke-width="2.5" stroke-linecap="round"/><circle cx="47" cy="9" r="2.5" fill="#484078"/><circle cx="83" cy="9" r="2.5" fill="#484078"/><ellipse cx="55" cy="46" rx="7" ry="7.5" fill="#fff" stroke="#181030" stroke-width="0.5"/><ellipse cx="56" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="57" cy="45" rx="1.5" ry="1.8" fill="#fff"/><ellipse cx="75" cy="46" rx="7" ry="7.5" fill="#fff" stroke="#181030" stroke-width="0.5"/><ellipse cx="76" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="77" cy="45" rx="1.5" ry="1.8" fill="#fff"/><path d="M52 60Q58 70,65 70Q72 70,78 60" fill="#C06040" stroke="#802820" stroke-width="0.8"/><path d="M55 60L57 65L59 60" fill="#fff"/><path d="M71 60L73 65L75 60" fill="#fff"/><ellipse cx="52" cy="73" rx="6" ry="4" fill="#302858"/><ellipse cx="78" cy="73" rx="6" ry="4" fill="#302858"/><path d="M65 74Q68 82,74 86Q80 88,84 84" fill="none" stroke="#383068" stroke-width="2.5" stroke-linecap="round"/><ellipse cx="40" cy="58" rx="5" ry="4" fill="#302858" transform="rotate(-20,40,58)"/><ellipse cx="90" cy="58" rx="5" ry="4" fill="#302858" transform="rotate(20,90,58)"/></svg>`}];

const SAVE_MESSAGES=[
'<span class="hl">Jimmy</span> recorded a new page in the Adventure Log!\n\nThy thoughts are preserved for the ages.',
'The quill glows with magical light!\n\n<span class="hl">Jimmy\'s</span> words have been inscribed in the sacred tome.',
'<span class="hl">Jimmy</span> rests at the inn and reflects on the journey.\n\nProgress has been <span class="gr">saved</span>!',
'A new chapter unfolds!\n\n<span class="hl">Jimmy\'s</span> adventure log grows ever stronger.',
'<span class="hl">Jimmy</span> gained insight from writing!\n\nSelf-awareness increased by <span class="gr">1</span>!',
'The pen is mightier than the sword!\n\n<span class="hl">Jimmy</span> recorded the day\'s battles.',
'The Goddess smiles upon thee.\n\nThy <span class="gr">adventure log</span> has been updated!',
'<span class="hl">Jimmy</span> faces the day with courage.\n\nEntry recorded. The quest continues!',
'The party rests by the campfire.\n\n<span class="hl">Jimmy\'s</span> thoughts join the flickering embers.',
'<span class="hl">Jimmy</span> opens the sacred tome and writes.\n\nAnother day survived. Another page <span class="gr">filled</span>.',
];

const STORAGE_KEY='adventure-log-entries';
let entries=[];
let state={editingId:null};
let pendingDeleteId=null;

function spawnCreature(){const c=CREATURES[Math.floor(Math.random()*CREATURES.length)];document.getElementById('creatureWrap').innerHTML=c.svg;}

function init(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r)entries=JSON.parse(r);}catch(e){}
  document.getElementById('dateText').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  spawnCreature();updateUI();
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(entries));}
function updateUI(){
  document.getElementById('entryCount').textContent=entries.length;
  document.getElementById('statEntries').textContent=entries.length;
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(entries.some(e=>new Date(e.date).toDateString()===d.toDateString()))streak++;else break;}
  document.getElementById('statStreak').textContent=streak;
  document.getElementById('statStreak').style.color=streak>=7?'var(--green)':'var(--text-gold)';
  const words=entries.reduce((s,e)=>s+(e.text||'').split(/\s+/).filter(w=>w).length,0);
  document.getElementById('statWords').textContent=words>999?(words/1000).toFixed(1)+'k':words;
  document.getElementById('submitBtn').textContent=state.editingId?'Save Changes':'Record in the Adventure Log';
  const c=document.getElementById('cancelBtn');if(state.editingId)c.classList.add('visible');else c.classList.remove('visible');
}
function resetForm(){state={editingId:null};document.getElementById('journalText').value='';updateUI();}
function handleSubmit(){
  const text=document.getElementById('journalText').value.trim();
  if(!text){showToast('Write something first, hero!');return;}
  const existing=state.editingId?entries.find(e=>e.id===state.editingId):null;
  const entry={id:state.editingId||Date.now(),date:existing?existing.date:new Date().toISOString(),text};
  if(state.editingId)entries=entries.map(e=>e.id===state.editingId?entry:e);
  else entries.push(entry);
  entries.sort((a,b)=>new Date(a.date)-new Date(b.date));save();
  const wasEditing=!!state.editingId;resetForm();updateUI();
  if(wasEditing){showToast('Entry updated!');showView('log');}
  else{
    const msg=SAVE_MESSAGES[Math.floor(Math.random()*SAVE_MESSAGES.length)];
    document.getElementById('successText').innerHTML=msg.replace(/\n/g,'<br>');
    document.getElementById('successOverlay').classList.add('open');
  }
}
function cancelEdit(){resetForm();}
function editEntry(id){const e=entries.find(x=>x.id===id);if(!e)return;state.editingId=e.id;document.getElementById('journalText').value=e.text||'';showView('write');updateUI();}
function requestDelete(id){pendingDeleteId=id;document.getElementById('delOverlay').classList.add('open');document.getElementById('delConfirmBtn').onclick=()=>{entries=entries.filter(e=>e.id!==pendingDeleteId);save();closeDelete();renderLog();updateUI();showToast('Entry erased');};}
function closeDelete(){document.getElementById('delOverlay').classList.remove('open');pendingDeleteId=null;}
function closeSuccess(){document.getElementById('successOverlay').classList.remove('open');}
function showView(v){
  ['writeView','logView'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  ['navWrite','navLog'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(v==='write'){document.getElementById('writeView').classList.remove('hidden');document.getElementById('navWrite').classList.add('active');}
  else{document.getElementById('logView').classList.remove('hidden');document.getElementById('navLog').classList.add('active');renderLog();}
}
function renderLog(){
  const wrap=document.getElementById('logList');
  const query=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  let filtered=[...entries].reverse();
  if(query)filtered=filtered.filter(e=>(e.text||'').toLowerCase().includes(query));
  if(!filtered.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-text">${query?'No matching entries':'The adventure log is empty'}</div><div class="empty-sub">${query?'Try different words':'Begin thy tale, hero'}</div></div>`;return;}
  let html='';
  filtered.forEach((entry,i)=>{
    const dateStr=new Date(entry.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const num=entries.indexOf(entry)+1;
    const preview=(entry.text||'').length>200?entry.text.slice(0,200)+'...':entry.text;
    html+=`<div class="log-card dq-window" style="animation-delay:${i*0.04}s"><div class="lc-top"><div class="lc-entry-num">Entry #${num}</div><div class="lc-date">${dateStr}</div></div><div class="lc-body">${escHtml(preview)}</div><div class="lc-actions"><button class="lc-btn" onclick="editEntry(${entry.id})">✏️ Edit</button><button class="lc-btn" onclick="requestDelete(${entry.id})">Erase</button></div></div>`;
  });
  wrap.innerHTML=html;
}
function exportJSON(){if(!entries.length){showToast('Nothing to export');return;}dl(JSON.stringify(entries,null,2),'adventure-log-'+iso()+'.json','application/json');showToast('JSON exported!');}
function exportTXT(){if(!entries.length){showToast('Nothing to export');return;}const txt=entries.map(e=>{const d=new Date(e.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});return'═══ '+d+' ═══\n\n'+e.text+'\n';}).join('\n\n');dl(txt,'adventure-log-'+iso()+'.txt','text/plain');showToast('Text exported!');}
function dl(c,n,t){const b=new Blob([c],{type:t});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);}
function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const imp=JSON.parse(e.target.result);if(!Array.isArray(imp))throw 0;entries=imp;save();updateUI();showToast(entries.length+' entries loaded!');}catch(err){showToast('Import failed');}};reader.readAsText(file);event.target.value='';}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function iso(){return new Date().toISOString().slice(0,10);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
init();
</script>
</body>
</html>
