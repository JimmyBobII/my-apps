<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08060f">
<title>Gratitude Chest</title>
<style>
:root {
  --bg: #08060f;
  --bg-window: #0d0a1e;
  --border-outer: #f0e0a0;
  --border-inner: #b89840;
  --border-dark: #584810;
  --text: #f0f0f0;
  --text-dim: #7878a0;
  --text-gold: #f0d860;
  --text-blue: #58a8f8;
  --gold-glow: rgba(240, 216, 96, 0.15);
  --green: #58d858;
  --red: #f06868;
  --red-glow: rgba(240,104,104,0.12);
  --font: 'Courier New', 'Courier', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  min-height: 100vh; min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px 0;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Ambient atmosphere ── */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle at 50% 30%, rgba(240,216,96,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── DQ Window ── */
.dq-window {
  position: relative;
  background: var(--bg-window);
  border: 3px solid var(--border-outer);
  border-radius: 8px;
  padding: 16px;
  box-shadow: inset 0 0 0 2px var(--border-dark), 0 0 20px rgba(240,216,96,0.06);
}
.dq-window::before {
  content: '';
  position: absolute; inset: 2px;
  border: 1px solid var(--border-inner);
  border-radius: 5px;
  pointer-events: none;
}

/* ── Creature (small, top corner) ── */
.creature-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px 0;
  cursor: pointer;
  position: relative; z-index: 1;
}
.creature-mini {
  width: 36px; height: 36px;
  animation: miniFloat 3s ease-in-out infinite;
}
.creature-mini svg { width: 100%; height: 100%; }
@keyframes miniFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
.creature-bar-name {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
}
.creature-bar-right {
  margin-left: auto;
  font-size: 10px; color: var(--text-dim);
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 8px 16px 6px;
  position: relative; z-index: 1;
}
.header h1 {
  font-size: 22px;
  color: var(--text-gold);
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(240,216,96,0.25), 0 2px 4px rgba(0,0,0,0.5);
  text-transform: uppercase;
}
.header .sub {
  font-size: 11px; color: var(--text-dim); margin-top: 4px;
}

/* ── Treasure Chest Scene ── */
.chest-scene {
  position: relative;
  width: 100%;
  height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 0 8px;
  z-index: 1;
  overflow: visible;
}

/* Floor shadow */
.chest-scene::after {
  content: '';
  position: absolute;
  bottom: 20px;
  left: 50%; transform: translateX(-50%);
  width: 180px; height: 24px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
}

.chest-wrap {
  position: relative;
  width: 160px; height: 140px;
  cursor: pointer;
  z-index: 2;
}

/* SVG Chest */
.chest-svg { width: 100%; height: 100%; }

/* Chest lid animation */
.chest-lid {
  transform-origin: 50% 100%;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chest-wrap.open .chest-lid {
  transform: rotate(-110deg);
}

/* Glow when open */
.chest-glow {
  position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 80px;
  background: radial-gradient(ellipse, rgba(240,216,96,0.35) 0%, rgba(240,216,96,0.1) 40%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s 0.2s;
  pointer-events: none;
}
.chest-wrap.open .chest-glow { opacity: 1; }

/* ── Particles ── */
.particle-container {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
  overflow: visible;
}

.particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-gold);
  box-shadow: 0 0 6px rgba(240,216,96,0.6);
  opacity: 0;
}

@keyframes particleRise {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  15% { opacity: 1; transform: translateY(-10px) scale(1); }
  80% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-100px) scale(0.3); }
}

/* Ambient floating particles (always) */
.ambient-particle {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(240,216,96,0.3);
  animation: ambientFloat linear infinite;
}

@keyframes ambientFloat {
  0% { opacity: 0; transform: translateY(0); }
  20% { opacity: 0.5; }
  80% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-120px); }
}

/* ── Stats ── */
.stats-row {
  display: flex;
  gap: 6px;
  padding: 0 16px 8px;
  position: relative; z-index: 1;
}
.stat-pill {
  flex: 1;
  text-align: center;
  background: var(--bg-window);
  border: 2px solid var(--border-dark);
  border-radius: 6px;
  padding: 8px 4px;
}
.stat-val { font-size: 18px; font-weight: bold; color: var(--text-gold); }
.stat-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

/* ── Action buttons ── */
.actions {
  display: flex;
  gap: 8px;
  padding: 0 16px 10px;
  position: relative; z-index: 1;
}

.action-btn {
  flex: 1;
  padding: 14px 8px;
  border: 2px solid var(--border-outer);
  border-radius: 6px;
  background: linear-gradient(180deg, #2a2050, #1a1030);
  color: var(--text-gold);
  font-family: var(--font);
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  box-shadow: 0 0 16px rgba(240,216,96,0.06);
  transition: all 0.2s;
}

.action-btn:active { transform: scale(0.97); }

.action-btn.secondary {
  background: var(--bg-window);
  border-color: var(--border-dark);
  color: var(--text-dim);
  box-shadow: none;
}

.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Gratitude display (when opened) ── */
.gratitude-reveal {
  margin: 0 16px 12px;
  padding: 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s 0.3s;
}
.gratitude-reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

.gr-sparkle { font-size: 24px; margin-bottom: 8px; }

.gr-text {
  font-size: 16px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 10px;
}

.gr-date {
  font-size: 10px;
  color: var(--text-dim);
}

.gr-close-btn {
  margin-top: 14px;
  padding: 10px 24px;
  border: 2px solid var(--border-outer);
  border-radius: 4px;
  background: linear-gradient(180deg, #2a2050, #1a1030);
  color: var(--text-gold);
  font-family: var(--font);
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
}

/* ── Input overlay ── */
.input-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.input-overlay.open { opacity: 1; pointer-events: auto; }

.input-box {
  max-width: 440px;
  width: 100%;
  padding: 20px;
  margin-bottom: 20px;
}

.input-box .label {
  font-size: 11px;
  color: var(--text-gold);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: block;
  text-align: center;
}

.input-box textarea {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border-inner);
  border-radius: 4px;
  background: #0d0a1e;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  outline: none;
  resize: none;
  line-height: 1.6;
  margin-bottom: 12px;
}
.input-box textarea:focus { border-color: var(--border-outer); }
.input-box textarea::placeholder { color: #404060; }

.input-btns {
  display: flex;
  gap: 8px;
}
.input-btns button {
  flex: 1;
  padding: 12px;
  border-radius: 4px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
}
.input-save {
  border: 2px solid var(--border-outer);
  background: linear-gradient(180deg, #2a2050, #1a1030);
  color: var(--text-gold);
}
.input-cancel {
  border: 1px solid var(--border-dark);
  background: transparent;
  color: var(--text-dim);
}

/* ── History ── */
.history-section {
  padding: 0 16px;
  position: relative; z-index: 1;
}

.history-toggle {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border-dark);
  border-radius: 4px;
  background: var(--bg-window);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.history-list { display: none; }
.history-list.visible { display: block; }

.h-card {
  margin-bottom: 8px;
  padding: 12px;
}
.h-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.h-card-date { font-size: 10px; color: var(--text-dim); }
.h-card-num { font-size: 10px; color: var(--text-gold); font-weight: bold; }
.h-card-text { font-size: 12px; color: var(--text); line-height: 1.6; }
.h-card-del {
  padding: 3px 8px;
  border: 1px solid var(--border-dark);
  border-radius: 3px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 10px;
  cursor: pointer;
  margin-top: 8px;
  float: right;
}

/* ── Export ── */
.export-bar {
  display: flex; gap: 6px;
  padding: 10px 16px;
  position: relative; z-index: 1;
}
.export-btn {
  flex: 1; padding: 8px;
  border: 1px solid var(--border-dark); border-radius: 4px;
  background: var(--bg-window); color: var(--text-dim);
  font-family: var(--font); font-size: 10px; font-weight: bold;
  cursor: pointer;
}

/* ── Delete confirm ── */
.del-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.del-overlay.open { opacity: 1; pointer-events: auto; }
.del-box { max-width: 300px; width: 100%; text-align: center; }
.del-box p { font-size: 13px; color: var(--text); margin-bottom: 16px; }
.del-btns { display: flex; gap: 8px; }
.del-btns button {
  flex: 1; padding: 10px; border-radius: 4px;
  font-family: var(--font); font-size: 12px; font-weight: bold; cursor: pointer;
}
.del-keep { border: 1px solid var(--border-dark); background: transparent; color: var(--text-dim); }
.del-yes { border: 2px solid var(--red); background: var(--red-glow); color: var(--red); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--bg-window); border: 2px solid var(--border-outer);
  color: var(--text-gold); padding: 8px 18px; border-radius: 4px;
  font-family: var(--font); font-size: 13px; font-weight: bold;
  z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.h-card { animation: fadeUp 0.25s ease both; }

@keyframes gentlePulse {
  0%,100% { filter: drop-shadow(0 0 8px rgba(240,216,96,0.15)); }
  50% { filter: drop-shadow(0 0 16px rgba(240,216,96,0.3)); }
}
.chest-wrap { animation: gentlePulse 4s ease-in-out infinite; }
.chest-wrap.open { animation: none; filter: drop-shadow(0 0 24px rgba(240,216,96,0.4)); }
</style>
</head>
<body>

<!-- Creature bar -->
<div class="creature-bar" onclick="spawnCreature()">
  <div class="creature-mini" id="creatureWrap"></div>
  <div class="creature-bar-name" id="creatureName"></div>
  <div class="creature-bar-right" id="dateText"></div>
</div>

<!-- Header -->
<div class="header">
  <h1>Gratitude Chest</h1>
  <div class="sub">One good thing. Every day.</div>
</div>

<!-- Chest Scene -->
<div class="chest-scene">
  <div class="particle-container" id="particles"></div>
  <div class="chest-wrap" id="chestWrap">
    <div class="chest-glow"></div>
    <svg class="chest-svg" viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="woodDark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8B5E3C"/>
          <stop offset="100%" stop-color="#5C3A1E"/>
        </linearGradient>
        <linearGradient id="woodLight" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#A67B5B"/>
          <stop offset="100%" stop-color="#7A5230"/>
        </linearGradient>
        <linearGradient id="metalGold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFE070"/>
          <stop offset="50%" stop-color="#D4A830"/>
          <stop offset="100%" stop-color="#A07818"/>
        </linearGradient>
        <linearGradient id="lidTop" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#9B6E42"/>
          <stop offset="100%" stop-color="#6B4420"/>
        </linearGradient>
        <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFE8A0"/>
          <stop offset="100%" stop-color="#D4A020"/>
        </linearGradient>
      </defs>

      <!-- Inner glow (visible when open) -->
      <rect x="20" y="65" width="120" height="50" rx="3" fill="url(#innerGlow)" opacity="0.3"/>

      <!-- Box body -->
      <rect x="15" y="65" width="130" height="55" rx="5" fill="url(#woodDark)" stroke="#3A2210" stroke-width="1.5"/>
      <!-- Wood grain lines -->
      <line x1="20" y1="80" x2="140" y2="80" stroke="#4A3018" stroke-width="0.5" opacity="0.5"/>
      <line x1="20" y1="95" x2="140" y2="95" stroke="#4A3018" stroke-width="0.5" opacity="0.5"/>
      <!-- Front face highlight -->
      <rect x="20" y="68" width="120" height="48" rx="3" fill="url(#woodLight)" opacity="0.3"/>
      <!-- Metal band bottom -->
      <rect x="12" y="63" width="136" height="6" rx="2" fill="url(#metalGold)" stroke="#806020" stroke-width="0.5"/>
      <rect x="12" y="115" width="136" height="6" rx="2" fill="url(#metalGold)" stroke="#806020" stroke-width="0.5"/>
      <!-- Metal corners -->
      <rect x="12" y="63" width="8" height="58" rx="2" fill="url(#metalGold)" stroke="#806020" stroke-width="0.5"/>
      <rect x="140" y="63" width="8" height="58" rx="2" fill="url(#metalGold)" stroke="#806020" stroke-width="0.5"/>
      <!-- Lock plate -->
      <rect x="65" y="72" width="30" height="24" rx="4" fill="url(#metalGold)" stroke="#806020" stroke-width="0.8"/>
      <circle cx="80" cy="84" r="4" fill="#3A2210" stroke="#806020" stroke-width="0.5"/>
      <rect x="78" y="84" width="4" height="6" rx="1" fill="#3A2210"/>

      <!-- Lid (animated group) -->
      <g class="chest-lid">
        <!-- Lid body -->
        <path d="M15 65 Q15 40, 80 35 Q145 40, 145 65 Z" fill="url(#lidTop)" stroke="#3A2210" stroke-width="1.5"/>
        <!-- Lid highlight -->
        <path d="M25 62 Q25 45, 80 40 Q135 45, 135 62 Z" fill="rgba(255,255,255,0.06)"/>
        <!-- Metal band top of lid -->
        <path d="M13 65 Q13 39, 80 33 Q147 39, 147 65" fill="none" stroke="url(#metalGold)" stroke-width="4"/>
        <!-- Center metal strip on lid -->
        <line x1="80" y1="35" x2="80" y2="65" stroke="url(#metalGold)" stroke-width="3"/>
        <!-- Rivets -->
        <circle cx="40" cy="55" r="2" fill="#D4A830" stroke="#806020" stroke-width="0.5"/>
        <circle cx="80" cy="50" r="2" fill="#D4A830" stroke="#806020" stroke-width="0.5"/>
        <circle cx="120" cy="55" r="2" fill="#D4A830" stroke="#806020" stroke-width="0.5"/>
      </g>
    </svg>
  </div>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-pill">
    <div class="stat-val" id="statTotal">0</div>
    <div class="stat-label">Treasures</div>
  </div>
  <div class="stat-pill">
    <div class="stat-val" id="statStreak">0</div>
    <div class="stat-label">Day Streak</div>
  </div>
  <div class="stat-pill">
    <div class="stat-val" id="statMonth">0</div>
    <div class="stat-label">This Month</div>
  </div>
</div>

<!-- Action buttons -->
<div class="actions">
  <button class="action-btn" onclick="showInput()">✦ Add Gratitude</button>
  <button class="action-btn secondary" id="openBtn" onclick="openChest()" disabled>Open the Chest</button>
</div>

<!-- Gratitude reveal (shown when chest opens) -->
<div class="gratitude-reveal dq-window" id="revealBox">
  <div class="gr-sparkle">✨</div>
  <div class="gr-text" id="revealText"></div>
  <div class="gr-date" id="revealDate"></div>
  <button class="gr-close-btn" onclick="closeChest()">Close Chest</button>
</div>

<!-- History -->
<div class="history-section">
  <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">📜 View All Treasures <span id="historyCount">0</span></button>
  <div class="history-list" id="historyList"></div>
</div>

<!-- Export -->
<div class="export-bar">
  <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  <button class="export-btn" onclick="exportTXT()">Export Text</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<!-- Input overlay -->
<div class="input-overlay" id="inputOverlay">
  <div class="input-box dq-window">
    <div class="label">✦ What art thou grateful for?</div>
    <textarea id="gratInput" rows="4" placeholder="Even the smallest treasure counts..."></textarea>
    <div class="input-btns">
      <button class="input-cancel" onclick="hideInput()">Cancel</button>
      <button class="input-save" onclick="saveGratitude()">Store in Chest</button>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="del-overlay" id="delOverlay">
  <div class="del-box dq-window">
    <p>Discard this treasure?</p>
    <div class="del-btns">
      <button class="del-keep" onclick="closeDel()">Nay</button>
      <button class="del-yes" id="delConfirmBtn">Aye</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Creatures ──

 rx="7" ry="7.5" fill="#fff"/><ellipse cx="56" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="57" cy="45" rx="1.5" ry="1.8" fill="#fff"/><ellipse cx="75" cy="46" rx="7" ry="7.5" fill="#fff"/><ellipse cx="76" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="77" cy="45" rx="1.5" ry="1.8" fill="#fff"/><path d="M52 60Q58 70,65 70Q72 70,78 60" fill="#C06040"/><path d="M55 60L57 65L59 60" fill="#fff"/><path d="M71 60L73 65L75 60" fill="#fff"/><ellipse cx="52" cy="73" rx="6" ry="4" fill="#302858"/><ellipse cx="78" cy="73" rx="6" ry="4" fill="#302858"/><path d="M65 74Q68 82,74 86Q80 88,84 84" fill="none" stroke="#383068" stroke-width="2.5" stroke-linecap="round"/></svg>`},{name:'Bubble Slime',svg:`<svg viewBox="0 0 120 100"><defs><radialGradient id="bg1" cx="40%" cy="40%" r="55%"><stop offset="0%" stop-color="#C8D8E0"/><stop offset="40%" stop-color="#90A8B8"/><stop offset="100%" stop-color="#405060"/></radialGradient><radialGradient id="bub" cx="35%" cy="30%" r="50%"><stop offset="0%" stop-color="rgba(255,255,255,0.5)"/><stop offset="100%" stop-color="rgba(200,220,230,0.2)"/></radialGradient></defs><ellipse cx="60" cy="78" rx="52" ry="18" fill="url(#bg1)" stroke="#405060" stroke-width="1"/><ellipse cx="48" cy="74" rx="5.5" ry="6.5" fill="#fff"/><ellipse cx="49" cy="74.5" rx="2.8" ry="3.5" fill="#1A1A2E"/><ellipse cx="49.8" cy="73.2" rx="1.2" ry="1.4" fill="#fff"/><ellipse cx="68" cy="74" rx="5.5" ry="6.5" fill="#fff"/><ellipse cx="69" cy="74.5" rx="2.8" ry="3.5" fill="#1A1A2E"/><ellipse cx="69.8" cy="73.2" rx="1.2" ry="1.4" fill="#fff"/><path d="M50 83Q55 88,60 88Q65 87,67 83" fill="#303848"/><circle cx="35" cy="50" r="7" fill="url(#bub)"/><circle cx="55" cy="38" r="9" fill="url(#bub)"/><circle cx="78" cy="44" r="6" fill="url(#bub)"/><circle cx="45" cy="28" r="5" fill="url(#bub)"/><circle cx="70" cy="30" r="4" fill="url(#bub)"/></svg>`}];

const STORAGE_KEY = 'gratitude-chest-entries';
let entries = [];
let pendingDeleteId = null;
let chestIsOpen = false;
let historyVisible = false;

function spawnCreature() {
  const c = CREATURES[Math.floor(Math.random() * CREATURES.length)];
  document.getElementById('creatureWrap').innerHTML = c.svg;
  document.getElementById('creatureName').textContent = c.name;
}

function init() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) entries = JSON.parse(r); } catch(e) {}
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  spawnCreature();
  spawnAmbientParticles();
  updateUI();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function updateUI() {
  document.getElementById('statTotal').textContent = entries.length;
  document.getElementById('historyCount').textContent = entries.length;
  document.getElementById('openBtn').disabled = entries.length === 0;

  // Streak
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (entries.some(e => new Date(e.date).toDateString() === d.toDateString())) streak++;
    else break;
  }
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statStreak').style.color = streak >= 7 ? 'var(--green)' : 'var(--text-gold)';

  // This month
  const now = new Date();
  const thisMonth = entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  document.getElementById('statMonth').textContent = thisMonth;
}

// ── Input ──
function showInput() {
  document.getElementById('inputOverlay').classList.add('open');
  setTimeout(() => document.getElementById('gratInput').focus(), 100);
}
function hideInput() {
  document.getElementById('inputOverlay').classList.remove('open');
  document.getElementById('gratInput').value = '';
}

function saveGratitude() {
  const text = document.getElementById('gratInput').value.trim();
  if (!text) { showToast('Write something first!'); return; }

  entries.push({ id: Date.now(), date: new Date().toISOString(), text });
  save();
  hideInput();
  updateUI();

  // Chest open animation with particles
  const chest = document.getElementById('chestWrap');
  chest.classList.add('open');
  burstParticles();

  setTimeout(() => {
    chest.classList.remove('open');
    showToast('✦ Treasure stored!');
  }, 1800);

  if (historyVisible) renderHistory();
}

// ── Open chest (show random gratitude) ──
function openChest() {
  if (entries.length === 0 || chestIsOpen) return;
  chestIsOpen = true;

  const chest = document.getElementById('chestWrap');
  chest.classList.add('open');
  burstParticles();

  const entry = entries[Math.floor(Math.random() * entries.length)];
  const dateStr = new Date(entry.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

  document.getElementById('revealText').textContent = entry.text;
  document.getElementById('revealDate').textContent = dateStr;

  setTimeout(() => {
    document.getElementById('revealBox').classList.add('visible');
  }, 400);
}

function closeChest() {
  chestIsOpen = false;
  document.getElementById('chestWrap').classList.remove('open');
  document.getElementById('revealBox').classList.remove('visible');
}

// ── Particles ──
function burstParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const x = 40 + Math.random() * 80;
    const y = 80 + Math.random() * 30;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    const size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    const drift = (Math.random() - 0.5) * 60;
    p.style.animation = `particleRise ${0.8 + Math.random() * 0.8}s ease-out forwards`;
    p.style.setProperty('--drift', drift + 'px');
    p.animate([
      { opacity: 0, transform: `translateY(0) translateX(0) scale(0)` },
      { opacity: 1, transform: `translateY(-30px) translateX(${drift * 0.3}px) scale(1)`, offset: 0.2 },
      { opacity: 0.5, transform: `translateY(-70px) translateX(${drift * 0.7}px) scale(0.7)`, offset: 0.7 },
      { opacity: 0, transform: `translateY(-120px) translateX(${drift}px) scale(0.2)` }
    ], { duration: 800 + Math.random() * 800, easing: 'ease-out', fill: 'forwards', delay: Math.random() * 200 });
    container.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}

function spawnAmbientParticles() {
  const container = document.getElementById('particles');
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'ambient-particle';
    p.style.left = (30 + Math.random() * 100) + 'px';
    p.style.top = (100 + Math.random() * 40) + 'px';
    p.style.animationDuration = (3 + Math.random() * 3) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 6000);
  }, 800);
}

// ── History ──
function toggleHistory() {
  historyVisible = !historyVisible;
  const list = document.getElementById('historyList');
  if (historyVisible) {
    list.classList.add('visible');
    renderHistory();
  } else {
    list.classList.remove('visible');
  }
}

function renderHistory() {
  const wrap = document.getElementById('historyList');
  if (!entries.length) { wrap.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:var(--text-dim)">No treasures yet</div>'; return; }

  let html = '';
  [...entries].reverse().forEach((entry, i) => {
    const dateStr = new Date(entry.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    const num = entries.indexOf(entry) + 1;
    html += `<div class="h-card dq-window" style="animation-delay:${i * 0.03}s">
      <div class="h-card-top"><span class="h-card-num">✦ ${num}</span><span class="h-card-date">${dateStr}</span></div>
      <div class="h-card-text">${escHtml(entry.text)}</div>
      <button class="h-card-del" onclick="requestDelete(${entry.id})">Discard</button>
    </div>`;
  });
  wrap.innerHTML = html;
}

function requestDelete(id) {
  pendingDeleteId = id;
  document.getElementById('delOverlay').classList.add('open');
  document.getElementById('delConfirmBtn').onclick = () => {
    entries = entries.filter(e => e.id !== pendingDeleteId);
    save(); closeDel(); renderHistory(); updateUI();
    showToast('Treasure discarded');
  };
}
function closeDel() { document.getElementById('delOverlay').classList.remove('open'); pendingDeleteId = null; }

// ── Export/Import ──
function exportJSON() {
  if (!entries.length) { showToast('Nothing to export'); return; }
  dl(JSON.stringify(entries, null, 2), 'gratitude-chest-' + iso() + '.json', 'application/json');
  showToast('Exported!');
}
function exportTXT() {
  if (!entries.length) { showToast('Nothing to export'); return; }
  const txt = entries.map(e => {
    const d = new Date(e.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    return '✦ ' + d + '\n' + e.text;
  }).join('\n\n');
  dl(txt, 'gratitude-chest-' + iso() + '.txt', 'text/plain');
  showToast('Exported!');
}
function dl(c, n, t) { const b = new Blob([c], { type: t }); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = n; a.click(); URL.revokeObjectURL(u); }
function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imp = JSON.parse(e.target.result);
      if (!Array.isArray(imp)) throw 0;
      entries = imp; save(); updateUI();
      showToast(entries.length + ' treasures loaded!');
    } catch(err) { showToast('Import failed'); }
  };
  reader.readAsText(file); event.target.value = '';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function iso() { return new Date().toISOString().slice(0, 10); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>

</html>
