<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c20">
<title>Gratitude Chest</title>
<style>
:root {
  /* Authentic DQ UI Colors */
  --bg: #0b112c;
  --bg-window: #040814; 
  --border-light: #ffffff;
  --text: #f8f8f8;
  --text-dim: #b0b8d0;
  --text-gold: #f8d848;
  --text-blue: #68c0f8;
  --gold-glow: rgba(248, 216, 72, 0.15);
  --green: #68e868;
  --red: #f87070;
  --red-glow: rgba(248, 112, 112, 0.15);
  --font: 'Courier New', 'Courier', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  min-height: 100vh; min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px 0;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  text-shadow: 1px 1px 0px #000;
}

/* ── Authentic DQ Window ── */
.dq-window { 
  position: relative; 
  background: var(--bg-window); 
  border: 3px solid var(--border-light); 
  border-radius: 6px; 
  padding: 16px; 
  box-shadow: inset 0 0 0 2px var(--bg-window), inset 0 0 0 4px var(--border-light), 0 4px 15px rgba(0,0,0,0.5); 
}

/* ── Creature (small, top corner) ── */
.creature-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 16px 0; cursor: pointer;
  position: relative; z-index: 1;
}
.creature-mini { width: 42px; height: 42px; animation: miniFloat 3s ease-in-out infinite; }
.creature-mini svg { width: 100%; height: 100%; filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.5)); }
@keyframes miniFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.creature-bar-name { font-size: 13px; color: var(--text-gold); font-weight: bold; text-transform: uppercase; }
.creature-bar-right { margin-left: auto; font-size: 12px; color: var(--text-dim); }

/* ── Header ── */
.header { text-align: center; padding: 12px 16px 6px; position: relative; z-index: 1; }
.header h1 { font-size: 24px; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.header .sub { font-size: 13px; color: var(--text-dim); }

/* ── Treasure Chest Scene ── */
.chest-scene {
  position: relative; width: 100%; height: 260px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 0 16px; z-index: 1; overflow: visible;
}

/* Floor shadow */
.chest-scene::after {
  content: ''; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  width: 160px; height: 20px; background: radial-gradient(ellipse, rgba(0,0,0,0.7) 0%, transparent 70%);
}

.chest-wrap {
  position: relative; width: 180px; height: 160px;
  cursor: pointer; z-index: 2;
  /* Perspective is key to making the lid hinge backward naturally */
  perspective: 800px; 
}

.chest-svg { width: 100%; height: 100%; overflow: visible; }

/* The Hinge Magic */
.chest-lid {
  /* Hinge exactly at the seam line */
  transform-origin: 50% 75px; 
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-style: preserve-3d;
}
.chest-wrap.open .chest-lid {
  /* Tilt backward in 3D space */
  transform: rotateX(105deg);
}

.chest-glow {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  width: 140px; height: 100px;
  background: radial-gradient(ellipse, rgba(248,216,72,0.4) 0%, rgba(248,216,72,0.1) 40%, transparent 70%);
  opacity: 0; transition: opacity 0.4s 0.2s; pointer-events: none;
}
.chest-wrap.open .chest-glow { opacity: 1; }

/* ── Retro Blocky Particles ── */
.particle-container { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
.particle {
  position: absolute; width: 6px; height: 6px;
  background: var(--text-gold);
  /* Blocky square pixels instead of rounded circles */
  box-shadow: 0 0 8px rgba(248,216,72,0.8);
  opacity: 0;
}
@keyframes particleRise {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  15% { opacity: 1; transform: translateY(-10px) scale(1); }
  80% { opacity: 0.8; }
  100% { opacity: 0; transform: translateY(-120px) scale(0); }
}

.ambient-particle {
  position: absolute; width: 4px; height: 4px;
  background: rgba(248,216,72,0.4);
  animation: ambientFloat linear infinite;
}
@keyframes ambientFloat {
  0% { opacity: 0; transform: translateY(0); }
  20% { opacity: 0.6; }
  80% { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(-150px); }
}

/* ── Stats ── */
.stats-row { display: flex; gap: 8px; padding: 0 16px 16px; position: relative; z-index: 1; }
.stat-pill {
  flex: 1; text-align: center; background: var(--bg-window);
  border: 2px solid var(--border-light); border-radius: 4px; padding: 12px 4px;
}
.stat-val { font-size: 20px; font-weight: bold; color: var(--text-gold); }
.stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; font-weight: bold;}

/* ── Action buttons ── */
.actions { display: flex; gap: 8px; padding: 0 16px 16px; position: relative; z-index: 1; }
.action-btn {
  flex: 1; padding: 16px 8px; border: 2px solid var(--border-light); border-radius: 4px;
  background: linear-gradient(180deg, #182868, #0b112c); color: var(--text-gold);
  font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase;
  transition: all 0.2s;
}
.action-btn:active { transform: scale(0.97); background: #182868; }
.action-btn.secondary { background: var(--bg-window); border-color: var(--text-dim); color: var(--text-dim); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Gratitude display (when opened) ── */
.gratitude-reveal {
  margin: 0 16px 16px; padding: 24px; text-align: center;
  opacity: 0; transform: translateY(10px); transition: all 0.4s 0.3s;
}
.gratitude-reveal.visible { opacity: 1; transform: translateY(0); }
.gr-sparkle { font-size: 28px; margin-bottom: 12px; filter: grayscale(100%) brightness(200%); }
.gr-text { font-size: 16px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
.gr-date { font-size: 12px; color: var(--text-dim); margin-bottom: 16px;}
.gr-close-btn {
  padding: 12px 24px; border: 2px solid var(--border-light); border-radius: 4px;
  background: var(--bg-window); color: var(--text); font-family: var(--font); font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase;
}
.gr-close-btn:active { background: var(--border-light); color: var(--bg-window); }

/* ── History ── */
.history-section { padding: 0 16px; position: relative; z-index: 1; }
.history-toggle {
  width: 100%; padding: 14px; border: 2px solid var(--border-light); border-radius: 4px;
  background: var(--bg-window); color: var(--text-dim); font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 16px;
}
.history-toggle.active { color: var(--text-gold); background: var(--gold-glow);}
.history-list { display: none; }
.history-list.visible { display: block; }
.h-card { margin-bottom: 12px; padding: 16px; }
.h-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 6px;}
.h-card-date { font-size: 12px; color: var(--text-dim); }
.h-card-num { font-size: 14px; color: var(--text-gold); font-weight: bold; }
.h-card-text { font-size: 14px; color: var(--text); line-height: 1.6; }
.h-card-del {
  padding: 6px 12px; border: 2px solid var(--border-light); border-radius: 4px;
  background: transparent; color: var(--text); font-family: var(--font); font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 12px; float: right; text-transform: uppercase;
}
.h-card-del:active { background: var(--red); border-color: var(--red); }
.clearfix::after { content: ""; clear: both; display: table; }

/* ── Export ── */
.export-bar { display: flex; gap: 8px; padding: 16px; position: relative; z-index: 1; }
.export-btn {
  flex: 1; padding: 10px; border: 2px solid rgba(255,255,255,0.3); border-radius: 4px;
  background: transparent; color: var(--text-dim); font-family: var(--font); font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;
}

/* ── Overlays ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.overlay-box { max-width: 440px; width: 100%; }

.overlay-box .label {
  font-size: 14px; color: var(--text-gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; font-weight: bold; text-align: center;
}
.overlay-box textarea {
  width: 100%; padding: 16px; border: 2px solid var(--border-light); border-radius: 4px;
  background: var(--bg-window); color: var(--text); font-family: var(--font); font-size: 15px; outline: none; resize: none; line-height: 1.6; margin-bottom: 16px; text-shadow: none;
}
.overlay-box textarea:focus { border-color: var(--text-gold); }

.input-btns { display: flex; gap: 12px; }
.input-btns button { flex: 1; padding: 14px; border-radius: 4px; font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
.input-save { border: 2px solid var(--border-light); background: linear-gradient(180deg, #182868, #0b112c); color: var(--text-gold); }
.input-cancel { border: 2px dashed var(--red); background: var(--red-glow); color: var(--red); }

.del-box p { font-size: 15px; color: var(--text); margin-bottom: 20px; text-align: center; line-height: 1.5; }
.del-btns { display: flex; gap: 12px; }
.del-btns button { flex: 1; padding: 12px; border-radius: 4px; font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
.del-keep { border: 2px solid var(--border-light); background: transparent; color: var(--text); }
.del-yes { border: 2px solid var(--red); background: var(--red-glow); color: var(--red); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--bg-window); border: 2px solid var(--border-light); color: var(--text-gold); padding: 12px 24px; border-radius: 4px;
  font-family: var(--font); font-size: 14px; font-weight: bold; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.h-card { animation: fadeUp 0.25s ease both; }
@keyframes gentlePulse { 0%,100% { filter: drop-shadow(0 0 8px rgba(240,216,96,0.1)); } 50% { filter: drop-shadow(0 0 16px rgba(240,216,96,0.25)); } }
.chest-wrap { animation: gentlePulse 4s ease-in-out infinite; }
.chest-wrap.open { animation: none; filter: drop-shadow(0 0 24px rgba(240,216,96,0.4)); }
</style>
</head>
<body>

<div class="creature-bar" onclick="spawnCreature()">
  <div class="creature-mini" id="creatureWrap"></div>
  <div class="creature-bar-name" id="creatureName"></div>
  <div class="creature-bar-right" id="dateText"></div>
</div>

<div class="header">
  <h1>Treasure Chest</h1>
  <div class="sub">One piece of gratitude. Every day.</div>
</div>

<div class="chest-scene">
  <div class="particle-container" id="particles"></div>
  <div class="chest-wrap" id="chestWrap">
    <div class="chest-glow"></div>
    <svg class="chest-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="chestRed" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E83030"/>
          <stop offset="100%" stop-color="#A01010"/>
        </linearGradient>
        <linearGradient id="chestGold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFF0A0"/>
          <stop offset="40%" stop-color="#F8D848"/>
          <stop offset="100%" stop-color="#B88818"/>
        </linearGradient>
        <linearGradient id="darkInside" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#300000"/>
          <stop offset="100%" stop-color="#100000"/>
        </linearGradient>
      </defs>

      <rect x="25" y="75" width="110" height="40" fill="url(#darkInside)" stroke="#000" stroke-width="2"/>
      <rect x="35" y="85" width="90" height="25" fill="#F8D848" opacity="0.6" class="treasure-glow" filter="blur(4px)" />

      <rect x="20" y="75" width="120" height="60" rx="2" fill="url(#chestRed)" stroke="#000" stroke-width="2"/>
      
      <rect x="20" y="125" width="120" height="10" fill="url(#chestGold)" stroke="#000" stroke-width="2"/>
      <rect x="20" y="75" width="12" height="60" fill="url(#chestGold)" stroke="#000" stroke-width="2"/>
      <rect x="128" y="75" width="12" height="60" fill="url(#chestGold)" stroke="#000" stroke-width="2"/>
      
      <rect x="68" y="75" width="24" height="28" rx="2" fill="url(#chestGold)" stroke="#000" stroke-width="2"/>
      <path d="M 77 88 A 3 3 0 1 1 83 88 L 82 96 L 78 96 Z" fill="#000" />

      <g class="chest-lid">
        <path d="M20 75 C 20 20, 140 20, 140 75 Z" fill="url(#chestRed)" stroke="#000" stroke-width="2"/>
        
        <path d="M20 75 C 20 20, 140 20, 140 75" fill="none" stroke="url(#chestGold)" stroke-width="12" />
        <path d="M20 75 C 20 20, 140 20, 140 75" fill="none" stroke="#000" stroke-width="2" />
        
        <path d="M48 75 C 48 40, 55 30, 80 25" fill="none" stroke="url(#chestGold)" stroke-width="8" stroke-linecap="round"/>
        <path d="M112 75 C 112 40, 105 30, 80 25" fill="none" stroke="url(#chestGold)" stroke-width="8" stroke-linecap="round"/>
        <path d="M48 75 C 48 40, 55 30, 80 25" fill="none" stroke="#000" stroke-width="2"/>
        <path d="M112 75 C 112 40, 105 30, 80 25" fill="none" stroke="#000" stroke-width="2"/>
        
        <line x1="80" y1="25" x2="80" y2="75" stroke="url(#chestGold)" stroke-width="12" />
        <line x1="74" y1="25" x2="74" y2="75" stroke="#000" stroke-width="2" />
        <line x1="86" y1="25" x2="86" y2="75" stroke="#000" stroke-width="2" />
        
        <rect x="68" y="63" width="24" height="12" rx="2" fill="url(#chestGold)" stroke="#000" stroke-width="2"/>
      </g>
    </svg>
  </div>
</div>

<div class="stats-row">
  <div class="stat-pill">
    <div class="stat-val" id="statTotal">0</div>
    <div class="stat-label">Treasures</div>
  </div>
  <div class="stat-pill">
    <div class="stat-val" id="statStreak">0</div>
    <div class="stat-label">Day Streak</div>
  </div>
  <div class="stat-pill">
    <div class="stat-val" id="statMonth">0</div>
    <div class="stat-label">This Month</div>
  </div>
</div>

<div class="actions">
  <button class="action-btn" onclick="showInput()">✦ Store Treasure</button>
  <button class="action-btn secondary" id="openBtn" onclick="openChest()" disabled>Inspect Chest</button>
</div>

<div class="gratitude-reveal dq-window" id="revealBox">
  <div class="gr-sparkle">✨</div>
  <div class="gr-text" id="revealText"></div>
  <div class="gr-date" id="revealDate"></div>
  <button class="gr-close-btn" onclick="closeChest()">Close Chest</button>
</div>

<div class="history-section">
  <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">📜 View Inventory (<span id="historyCount">0</span>)</button>
  <div class="history-list" id="historyList"></div>
</div>

<div class="export-bar">
  <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  <button class="export-btn" onclick="exportTXT()">Export Text</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">Import File</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="overlay" id="inputOverlay">
  <div class="overlay-box dq-window">
    <div class="label">✦ What treasure didst thou find today?</div>
    <textarea id="gratInput" rows="4" placeholder="Even the smallest glimmer of light counts..."></textarea>
    <div class="input-btns">
      <button class="input-cancel" onclick="hideInput()">Cancel</button>
      <button class="input-save" onclick="saveGratitude()">Lock in Chest</button>
    </div>
  </div>
</div>

<div class="overlay" id="delOverlay">
  <div class="overlay-box dq-window">
    <p>Art thou sure thou wisheth to discard this treasure from thy inventory entirely?</p>
    <div class="del-btns">
      <button class="del-keep" onclick="closeDel()">Nay</button>
      <button class="del-yes" id="delConfirmBtn">Aye</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

"40%" stop-color="#2878D0"/><stop offset="100%" stop-color="#103870"/></radialGradient><linearGradient id="crG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE040"/><stop offset="100%" stop-color="#C89820"/></linearGradient></defs><ellipse cx="50" cy="68" rx="42" ry="28" fill="url(#kg1)" stroke="#0E4878" stroke-width="1"/><path d="M26 42L30 28L36 38L42 22L50 38L58 22L64 38L70 28L74 42Z" fill="url(#crG)"/><rect x="26" y="40" width="48" height="7" rx="1" fill="url(#crG)"/><circle cx="38" cy="43.5" r="2.5" fill="#50B878"/><circle cx="50" cy="43.5" r="2.8" fill="#C850C0"/><circle cx="62" cy="43.5" r="2.5" fill="#50B878"/><path d="M48 22L50 14L52 22" fill="url(#crG)"/><circle cx="50" cy="13" r="2" fill="#FFE040"/><ellipse cx="40" cy="64" rx="6" ry="7" fill="#fff"/><ellipse cx="41" cy="64.5" rx="3" ry="3.8" fill="#1A1A2E"/><ellipse cx="41.8" cy="63.2" rx="1.2" ry="1.5" fill="#fff"/><ellipse cx="60" cy="64" rx="6" ry="7" fill="#fff"/><ellipse cx="61" cy="64.5" rx="3" ry="3.8" fill="#1A1A2E"/><ellipse cx="61.8" cy="63.2" rx="1.2" ry="1.5" fill="#fff"/><path d="M40 76Q45 82,50 82Q55 82,60 76" fill="#D08070"/></svg>`},{name:'Dracky',svg:`<svg viewBox="0 0 130 100"><defs><radialGradient id="dg1" cx="45%" cy="40%" r="55%"><stop offset="0%" stop-color="#5850A0"/><stop offset="50%" stop-color="#383068"/><stop offset="100%" stop-color="#201840"/></radialGradient></defs><path d="M20 38L8 30Q3 40,10 48L18 52Z" fill="url(#dg1)" stroke="#181030" stroke-width="0.6"/><path d="M110 38L122 30Q127 40,120 48L112 52Z" fill="url(#dg1)" stroke="#181030" stroke-width="0.6"/><ellipse cx="65" cy="50" rx="26" ry="24" fill="url(#dg1)" stroke="#181030" stroke-width="1"/><path d="M55 28Q52 16,48 10" fill="none" stroke="#383068" stroke-width="2.5" stroke-linecap="round"/><path d="M75 28Q78 16,82 10" fill="none" stroke="#383068" stroke-width="2.5" stroke-linecap="round"/><circle cx="47" cy="9" r="2.5" fill="#484078"/><circle cx="83" cy="9" r="2.5" fill="#484078"/><ellipse cx="55" cy="46" rx="7" ry="7.5" fill="#fff"/><ellipse cx="56" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="57" cy="45" rx="1.5" ry="1.8" fill="#fff"/><ellipse cx="75" cy="46" rx="7" ry="7.5" fill="#fff"/><ellipse cx="76" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="77" cy="45" rx="1.5" ry="1.8" fill="#fff"/><path d="M52 60Q58 70,65 70Q72 70,78 60" fill="#C06040"/><path d="M55 60L57 65L59 60" fill="#fff"/><path d="M71 60L73 65L75 60" fill="#fff"/><ellipse cx="52" cy="73" rx="6" ry="4" fill="#302858"/><ellipse cx="78" cy="73" rx="6" ry="4" fill="#302858"/><path d="M65 74Q68 82,74 86Q80 88,84 84" fill="none" stroke="#383068" stroke-width="2.5" stroke-linecap="round"/></svg>`},{name:'Bubble Slime',svg:`<svg viewBox="0 0 120 100"><defs><radialGradient id="bg1" cx="40%" cy="40%" r="55%"><stop offset="0%" stop-color="#C8D8E0"/><stop offset="40%" stop-color="#90A8B8"/><stop offset="100%" stop-color="#405060"/></radialGradient><radialGradient id="bub" cx="35%" cy="30%" r="50%"><stop offset="0%" stop-color="rgba(255,255,255,0.5)"/><stop offset="100%" stop-color="rgba(200,220,230,0.2)"/></radialGradient></defs><ellipse cx="60" cy="78" rx="52" ry="18" fill="url(#bg1)" stroke="#405060" stroke-width="1"/><ellipse cx="48" cy="74" rx="5.5" ry="6.5" fill="#fff"/><ellipse cx="49" cy="74.5" rx="2.8" ry="3.5" fill="#1A1A2E"/><ellipse cx="49.8" cy="73.2" rx="1.2" ry="1.4" fill="#fff"/><ellipse cx="68" cy="74" rx="5.5" ry="6.5" fill="#fff"/><ellipse cx="69" cy="74.5" rx="2.8" ry="3.5" fill="#1A1A2E"/><ellipse cx="69.8" cy="73.2" rx="1.2" ry="1.4" fill="#fff"/><path d="M50 83Q55 88,60 88Q65 87,67 83" fill="#303848"/><circle cx="35" cy="50" r="7" fill="url(#bub)"/><circle cx="55" cy="38" r="9" fill="url(#bub)"/><circle cx="78" cy="44" r="6" fill="url(#bub)"/><circle cx="45" cy="28" r="5" fill="url(#bub)"/><circle cx="70" cy="30" r="4" fill="url(#bub)"/></svg>`}];

const STORAGE_KEY = 'gratitude-chest-entries';
let entries = [];
let pendingDeleteId = null;
let chestIsOpen = false;
let historyVisible = false;

function spawnCreature() {
  const c = CREATURES[Math.floor(Math.random() * CREATURES.length)];
  document.getElementById('creatureWrap').innerHTML = c.svg;
  document.getElementById('creatureName').textContent = c.name;
}

function init() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) entries = JSON.parse(r); } catch(e) {}
  document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  spawnCreature();
  spawnAmbientParticles();
  updateUI();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function updateUI() {
  document.getElementById('statTotal').textContent = entries.length;
  document.getElementById('historyCount').textContent = entries.length;
  document.getElementById('openBtn').disabled = entries.length === 0;

  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (entries.some(e => new Date(e.date).toDateString() === d.toDateString())) streak++;
    else break;
  }
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statStreak').style.color = streak >= 7 ? 'var(--green)' : 'var(--text-gold)';

  const now = new Date();
  const thisMonth = entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  document.getElementById('statMonth').textContent = thisMonth;
}

function showInput() {
  document.getElementById('inputOverlay').classList.add('open');
  setTimeout(() => document.getElementById('gratInput').focus(), 100);
}
function hideInput() {
  document.getElementById('inputOverlay').classList.remove('open');
  document.getElementById('gratInput').value = '';
}

function saveGratitude() {
  const text = document.getElementById('gratInput').value.trim();
  if (!text) { showToast('Thou must write something first!'); return; }

  entries.push({ id: Date.now(), date: new Date().toISOString(), text });
  save();
  hideInput();
  updateUI();

  const chest = document.getElementById('chestWrap');
  chest.classList.add('open');
  burstParticles();

  setTimeout(() => {
    chest.classList.remove('open');
    showToast('✦ Treasure safely locked away!');
  }, 1800);

  if (historyVisible) renderHistory();
}

function openChest() {
  if (entries.length === 0 || chestIsOpen) return;
  chestIsOpen = true;

  const chest = document.getElementById('chestWrap');
  chest.classList.add('open');
  burstParticles();

  const entry = entries[Math.floor(Math.random() * entries.length)];
  const dateStr = new Date(entry.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  document.getElementById('revealText').textContent = entry.text;
  document.getElementById('revealDate').textContent = dateStr;

  setTimeout(() => {
    document.getElementById('revealBox').classList.add('visible');
  }, 400);
}

function closeChest() {
  chestIsOpen = false;
  document.getElementById('chestWrap').classList.remove('open');
  document.getElementById('revealBox').classList.remove('visible');
}

function burstParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const x = 50 + Math.random() * 80;
    const y = 80 + Math.random() * 30;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    const size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    const drift = (Math.random() - 0.5) * 80;
    p.style.animation = `particleRise ${0.8 + Math.random() * 0.8}s ease-out forwards`;
    p.style.setProperty('--drift', drift + 'px');
    p.animate([
      { opacity: 0, transform: `translateY(0) translateX(0) scale(0)` },
      { opacity: 1, transform: `translateY(-40px) translateX(${drift * 0.3}px) scale(1)`, offset: 0.2 },
      { opacity: 0.8, transform: `translateY(-80px) translateX(${drift * 0.7}px) scale(0.8)`, offset: 0.7 },
      { opacity: 0, transform: `translateY(-140px) translateX(${drift}px) scale(0)` }
    ], { duration: 800 + Math.random() * 800, easing: 'ease-out', fill: 'forwards', delay: Math.random() * 150 });
    container.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}

function spawnAmbientParticles() {
  const container = document.getElementById('particles');
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'ambient-particle';
    p.style.left = (30 + Math.random() * 120) + 'px';
    p.style.top = (100 + Math.random() * 40) + 'px';
    p.style.animationDuration = (3 + Math.random() * 4) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 6000);
  }, 800);
}

function toggleHistory() {
  historyVisible = !historyVisible;
  const list = document.getElementById('historyList');
  const btn = document.getElementById('historyToggle');
  if (historyVisible) {
    list.classList.add('visible');
    btn.classList.add('active');
    renderHistory();
  } else {
    list.classList.remove('visible');
    btn.classList.remove('active');
  }
}

function renderHistory() {
  const wrap = document.getElementById('historyList');
  if (!entries.length) { wrap.innerHTML = '<div style="text-align:center;padding:24px;font-size:14px;color:var(--text-dim); font-weight:bold;">The chest is empty.</div>'; return; }

  let html = '';
  [...entries].reverse().forEach((entry, i) => {
    const dateStr = new Date(entry.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    const num = entries.indexOf(entry) + 1;
    html += `<div class="h-card dq-window clearfix" style="animation-delay:${i * 0.04}s">
      <div class="h-card-top"><span class="h-card-num">✦ Treasure ${num}</span><span class="h-card-date">${dateStr}</span></div>
      <div class="h-card-text">${escHtml(entry.text)}</div>
      <button class="h-card-del" onclick="requestDelete(${entry.id})">Discard</button>
    </div>`;
  });
  wrap.innerHTML = html;
}

function requestDelete(id) {
  pendingDeleteId = id;
  document.getElementById('delOverlay').classList.add('open');
  document.getElementById('delConfirmBtn').onclick = () => {
    entries = entries.filter(e => e.id !== pendingDeleteId);
    save(); closeDel(); renderHistory(); updateUI();
    showToast('Treasure discarded from inventory.');
  };
}
function closeDel() { document.getElementById('delOverlay').classList.remove('open'); pendingDeleteId = null; }

function exportJSON() {
  if (!entries.length) { showToast('No treasures to export!'); return; }
  dl(JSON.stringify(entries, null, 2), 'gratitude-chest-' + iso() + '.json', 'application/json');
  showToast('Chest contents exported!');
}
function exportTXT() {
  if (!entries.length) { showToast('No treasures to export!'); return; }
  const txt = entries.map(e => {
    const d = new Date(e.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    return '✦ ' + d + ' ✦\n' + e.text;
  }).join('\n\n');
  dl(txt, 'gratitude-chest-' + iso() + '.txt', 'text/plain');
  showToast('Chest contents exported!');
}
function dl(c, n, t) { const b = new Blob([c], { type: t }); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = n; a.click(); URL.revokeObjectURL(u); }
function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imp = JSON.parse(e.target.result);
      if (!Array.isArray(imp)) throw 0;
      entries = imp; save(); updateUI();
      if(historyVisible) renderHistory();
      showToast(entries.length + ' treasures loaded into the chest!');
    } catch(err) { showToast('The ancient magic failed. (Import error)'); }
  };
  reader.readAsText(file); event.target.value = '';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function iso() { return new Date().toISOString().slice(0, 10); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>

</html>
