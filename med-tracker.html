<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f14">
<title>Med Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #0f0f14 0%, #1a1a24 100%);
    color: #e4e4e7;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 40px 0;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid #2a2a3a;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .pill { font-size: 28px; }
  .title {
    font-size: 24px;
    font-weight: 700;
    color: #f4f4f5;
    letter-spacing: -0.5px;
  }
  .date-text {
    font-size: 14px;
    color: #9ca3af;
    margin-top: 4px;
  }
  .streak {
    font-size: 13px;
    color: #7c85f0;
    margin-top: 8px;
    font-weight: 600;
    display: none;
  }
  .streak.visible { display: block; }

  .nav {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid #2a2a3a;
  }
  .nav-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #3a3a4a;
    background: transparent;
    color: #9ca3af;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn.active {
    background: rgba(124, 133, 240, 0.12);
    border-color: #7c85f0;
    color: #a5adff;
  }

  .form-wrap, .history-wrap { padding: 20px; }

  .already-done {
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.25);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #86efac;
    margin-bottom: 16px;
    display: none;
  }
  .already-done.visible { display: block; }

  .day-badge {
    display: inline-block;
    background: linear-gradient(135deg, #7c85f0 0%, #6366f1 100%);
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .field { margin-bottom: 20px; }
  .label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #d4d4d8;
    margin-bottom: 8px;
  }
  .mood-label-suffix { font-weight: 600; }

  .toggle-row, .ptsd-row, .mood-row { display: flex; gap: 8px; }
  .mood-row { gap: 8px; justify-content: space-between; }

  .toggle-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #3a3a4a;
    background: #1e1e2e;
    color: #9ca3af;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.yes {
    background: rgba(34, 197, 94, 0.12);
    border-color: #22c55e;
    color: #86efac;
  }
  .toggle-btn.no {
    background: rgba(239, 68, 68, 0.12);
    border-color: #ef4444;
    color: #fca5a5;
  }
  .toggle-btn.fever-no {
    background: rgba(34, 197, 94, 0.12);
    border-color: #22c55e;
    color: #86efac;
  }
  .toggle-btn.fever-yes {
    background: rgba(239, 68, 68, 0.12);
    border-color: #ef4444;
    color: #fca5a5;
  }

  .mood-btn {
    flex: 1;
    padding: 12px 4px;
    border-radius: 12px;
    border: 1px solid #3a3a4a;
    background: #1e1e2e;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .mood-btn.selected {
    transform: scale(1.12);
  }

  .ptsd-btn {
    flex: 1;
    padding: 10px 4px;
    border-radius: 10px;
    border: 1px solid #3a3a4a;
    background: #1e1e2e;
    color: #9ca3af;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ptsd-btn.active {
    background: rgba(124, 133, 240, 0.12);
    border-color: #7c85f0;
    color: #a5adff;
  }

  textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #3a3a4a;
    background: #1e1e2e;
    color: #e4e4e7;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    outline: none;
  }
  textarea::placeholder { color: #4b5563; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #7c85f0 0%, #6366f1 100%);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .cancel-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #3a3a4a;
    background: transparent;
    color: #9ca3af;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
  }
  .cancel-btn.visible { display: block; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 18px; font-weight: 600; color: #d4d4d8; margin-bottom: 4px; }
  .empty-sub { font-size: 14px; color: #6b7280; }

  .card {
    background: #1e1e2e;
    border: 1px solid #2a2a3a;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card-day-num { font-size: 16px; font-weight: 700; color: #a5adff; }
  .card-date { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .card-mood { font-size: 28px; }
  .card-body { display: flex; flex-direction: column; gap: 6px; }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 4px 0;
  }
  .card-label { font-size: 13px; color: #6b7280; font-weight: 500; min-width: 70px; }
  .card-value { font-size: 13px; color: #d4d4d8; text-align: right; flex: 1; }
  .card-notes {
    margin-top: 8px;
    padding: 10px 12px;
    background: #15151f;
    border-radius: 8px;
    font-size: 13px;
    color: #9ca3af;
    line-height: 1.4;
  }
  .card-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #2a2a3a;
  }
  .edit-btn, .delete-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #3a3a4a;
    background: transparent;
    color: #9ca3af;
    font-size: 13px;
    cursor: pointer;
  }
  .delete-btn { color: #6b7280; padding: 6px 10px; }

  .export-bar {
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
  }
  .export-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #3a3a4a;
    background: #1e1e2e;
    color: #9ca3af;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .export-btn:active {
    background: #2a2a3a;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #22c55e;
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="pill">💊</span>
    <h1 class="title">Med Tracker</h1>
  </div>
  <p class="date-text" id="dateText"></p>
  <p class="streak" id="streak"></p>
</div>

<div class="nav">
  <button class="nav-btn active" id="navForm" onclick="showView('form')">+ Check In</button>
  <button class="nav-btn" id="navHistory" onclick="showView('history')">📋 History (<span id="entryCount">0</span>)</button>
</div>

<div class="form-wrap" id="formView">
  <div class="already-done" id="alreadyDone">
    ✅ You've already logged today! You can still add another entry or edit a previous one from history.
  </div>

  <div class="day-badge" id="dayBadge">Day 1</div>

  <!-- Dose -->
  <div class="field">
    <label class="label">Dose taken?</label>
    <div class="toggle-row">
      <button class="toggle-btn" id="doseYes" onclick="setDose(true)">✓ Taken</button>
      <button class="toggle-btn" id="doseNo" onclick="setDose(false)">✗ Missed</button>
    </div>
  </div>

  <!-- Mood -->
  <div class="field">
    <label class="label">Mood <span class="mood-label-suffix" id="moodSuffix"></span></label>
    <div class="mood-row" id="moodRow"></div>
  </div>

  <!-- Physical -->
  <div class="field">
    <label class="label">Physical symptoms</label>
    <textarea id="physical" rows="2" placeholder="Fog, sleep issues, irritability..."></textarea>
  </div>

  <!-- PTSD -->
  <div class="field">
    <label class="label">PTSD check</label>
    <div class="ptsd-row" id="ptsdRow"></div>
  </div>

  <!-- Fever -->
  <div class="field">
    <label class="label">Fever?</label>
    <div class="toggle-row">
      <button class="toggle-btn" id="feverNo" onclick="setFever(false)">No</button>
      <button class="toggle-btn" id="feverYes" onclick="setFever(true)">Yes 🌡️</button>
    </div>
  </div>

  <!-- Notes -->
  <div class="field">
    <label class="label">Notes</label>
    <textarea id="notes" rows="3" placeholder="Anything else worth noting..."></textarea>
  </div>

  <button class="submit-btn" id="submitBtn" disabled onclick="handleSubmit()">Log Day</button>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelEdit()">Cancel Edit</button>
</div>

<div class="history-wrap hidden" id="historyView"></div>

<div class="export-bar" id="exportBar">
  <button class="export-btn" onclick="exportData()">📥 Export Backup</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">📤 Import Backup</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="toast" id="toast"></div>

<script>
const MOODS = [
  { emoji: '😫', label: 'Awful', value: 1, color: '#ef4444' },
  { emoji: '😟', label: 'Rough', value: 2, color: '#f97316' },
  { emoji: '😐', label: 'Meh',   value: 3, color: '#eab308' },
  { emoji: '🙂', label: 'Okay',  value: 4, color: '#22c55e' },
  { emoji: '😊', label: 'Good',  value: 5, color: '#10b981' },
];
const PTSD_LEVELS = ['None', 'Minor', 'Moderate', 'Severe'];
const STORAGE_KEY = 'med-tracker-entries';

let entries = [];
let state = { mood: null, dose: null, ptsd: null, fever: null, editingId: null };

// Init
function init() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) entries = JSON.parse(raw);
  } catch(e) {}

  // Date
  const now = new Date();
  document.getElementById('dateText').textContent = now.toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long'
  });

  // Build mood buttons
  const moodRow = document.getElementById('moodRow');
  MOODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn';
    btn.id = 'mood-' + m.value;
    btn.textContent = m.emoji;
    btn.onclick = () => setMood(m.value);
    moodRow.appendChild(btn);
  });

  // Build PTSD buttons
  const ptsdRow = document.getElementById('ptsdRow');
  PTSD_LEVELS.forEach(level => {
    const btn = document.createElement('button');
    btn.className = 'ptsd-btn';
    btn.id = 'ptsd-' + level;
    btn.textContent = level;
    btn.onclick = () => setPtsd(level);
    ptsdRow.appendChild(btn);
  });

  updateUI();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function getNextDay() {
  if (entries.length === 0) return 1;
  return Math.max(...entries.map(e => e.day)) + 1;
}

function hasTodayEntry() {
  const now = new Date();
  return entries.some(e => {
    const d = new Date(e.date);
    return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
}

function updateUI() {
  // Streak
  const streakEl = document.getElementById('streak');
  if (entries.length > 0) {
    const dosesTaken = entries.filter(e => e.doseTaken).length;
    streakEl.textContent = `Day ${getNextDay() - 1} tracked · ${dosesTaken}/${entries.length} doses taken`;
    streakEl.classList.add('visible');
  } else {
    streakEl.classList.remove('visible');
  }

  // Entry count
  document.getElementById('entryCount').textContent = entries.length;

  // Day badge
  if (state.editingId) {
    const entry = entries.find(e => e.id === state.editingId);
    document.getElementById('dayBadge').textContent = 'Editing Day ' + (entry ? entry.day : '?');
  } else {
    document.getElementById('dayBadge').textContent = 'Day ' + getNextDay();
  }

  // Today check
  const ad = document.getElementById('alreadyDone');
  if (hasTodayEntry() && !state.editingId) {
    ad.classList.add('visible');
  } else {
    ad.classList.remove('visible');
  }

  // Submit button
  const btn = document.getElementById('submitBtn');
  btn.disabled = (state.mood === null || state.dose === null);
  btn.textContent = state.editingId ? 'Save Changes' : 'Log Day';

  // Cancel button
  const cancel = document.getElementById('cancelBtn');
  if (state.editingId) cancel.classList.add('visible');
  else cancel.classList.remove('visible');

  // Mood suffix
  const suffix = document.getElementById('moodSuffix');
  if (state.mood !== null) {
    const m = MOODS[state.mood - 1];
    suffix.textContent = '— ' + m.label;
    suffix.style.color = m.color;
  } else {
    suffix.textContent = '';
  }
}

function setDose(val) {
  state.dose = val;
  document.getElementById('doseYes').className = 'toggle-btn' + (val === true ? ' yes' : '');
  document.getElementById('doseNo').className = 'toggle-btn' + (val === false ? ' no' : '');
  updateUI();
}

function setMood(val) {
  state.mood = val;
  MOODS.forEach(m => {
    const btn = document.getElementById('mood-' + m.value);
    if (m.value === val) {
      btn.className = 'mood-btn selected';
      btn.style.background = m.color + '22';
      btn.style.borderColor = m.color;
    } else {
      btn.className = 'mood-btn';
      btn.style.background = '#1e1e2e';
      btn.style.borderColor = '#3a3a4a';
    }
  });
  updateUI();
}

function setPtsd(level) {
  state.ptsd = level;
  PTSD_LEVELS.forEach(l => {
    document.getElementById('ptsd-' + l).className = 'ptsd-btn' + (l === level ? ' active' : '');
  });
}

function setFever(val) {
  state.fever = val;
  document.getElementById('feverNo').className = 'toggle-btn' + (val === false ? ' fever-no' : '');
  document.getElementById('feverYes').className = 'toggle-btn' + (val === true ? ' fever-yes' : '');
}

function resetForm() {
  state = { mood: null, dose: null, ptsd: null, fever: null, editingId: null };
  document.getElementById('physical').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('doseYes').className = 'toggle-btn';
  document.getElementById('doseNo').className = 'toggle-btn';
  document.getElementById('feverNo').className = 'toggle-btn';
  document.getElementById('feverYes').className = 'toggle-btn';
  MOODS.forEach(m => {
    const btn = document.getElementById('mood-' + m.value);
    btn.className = 'mood-btn';
    btn.style.background = '#1e1e2e';
    btn.style.borderColor = '#3a3a4a';
  });
  PTSD_LEVELS.forEach(l => {
    document.getElementById('ptsd-' + l).className = 'ptsd-btn';
  });
  updateUI();
}

function handleSubmit() {
  if (state.mood === null || state.dose === null) return;

  const existing = state.editingId ? entries.find(e => e.id === state.editingId) : null;

  const entry = {
    id: state.editingId || Date.now(),
    day: existing ? existing.day : getNextDay(),
    date: existing ? existing.date : new Date().toISOString(),
    mood: state.mood,
    doseTaken: state.dose,
    physical: document.getElementById('physical').value,
    ptsd: state.ptsd || 'None',
    fever: state.fever || false,
    notes: document.getElementById('notes').value,
  };

  if (state.editingId) {
    entries = entries.map(e => e.id === state.editingId ? entry : e);
  } else {
    entries.push(entry);
  }
  entries.sort((a, b) => a.day - b.day);
  save();
  resetForm();
  showView('history');
}

function cancelEdit() {
  resetForm();
  updateUI();
}

function editEntry(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  state.editingId = entry.id;
  setDose(entry.doseTaken);
  setMood(entry.mood);
  setPtsd(entry.ptsd || 'None');
  setFever(entry.fever || false);
  document.getElementById('physical').value = entry.physical || '';
  document.getElementById('notes').value = entry.notes || '';
  showView('form');
  updateUI();
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  renderHistory();
  updateUI();
}

function showView(v) {
  const formEl = document.getElementById('formView');
  const histEl = document.getElementById('historyView');
  const navF = document.getElementById('navForm');
  const navH = document.getElementById('navHistory');

  if (v === 'form') {
    formEl.classList.remove('hidden');
    histEl.classList.add('hidden');
    navF.classList.add('active');
    navH.classList.remove('active');
  } else {
    formEl.classList.add('hidden');
    histEl.classList.remove('hidden');
    navF.classList.remove('active');
    navH.classList.add('active');
    renderHistory();
  }
}

function renderHistory() {
  const wrap = document.getElementById('historyView');

  if (entries.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state">
        <p class="empty-emoji">📋</p>
        <p class="empty-text">No entries yet</p>
        <p class="empty-sub">Tap "Check In" to log your first day</p>
      </div>`;
    return;
  }

  const ptsdColor = (level) => {
    if (level === 'None') return '#6b7280';
    if (level === 'Minor') return '#eab308';
    if (level === 'Moderate') return '#f97316';
    return '#ef4444';
  };

  let html = '';
  const sorted = [...entries].reverse();
  sorted.forEach(entry => {
    const m = MOODS[entry.mood - 1];
    const dateStr = new Date(entry.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    const doseColor = entry.doseTaken ? '#22c55e' : '#ef4444';
    const doseText = entry.doseTaken ? '✓ Taken' : '✗ Missed';

    html += `<div class="card">
      <div class="card-header">
        <div>
          <div class="card-day-num">Day ${entry.day}</div>
          <div class="card-date">${dateStr}</div>
        </div>
        <div class="card-mood">${m ? m.emoji : '?'}</div>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="card-label">Dose</span>
          <span class="card-value" style="color:${doseColor}">${doseText}</span>
        </div>
        ${entry.physical ? `<div class="card-row"><span class="card-label">Physical</span><span class="card-value">${escHtml(entry.physical)}</span></div>` : ''}
        <div class="card-row">
          <span class="card-label">PTSD</span>
          <span class="card-value" style="color:${ptsdColor(entry.ptsd)}">${entry.ptsd}</span>
        </div>
        ${entry.fever ? `<div class="card-row"><span class="card-label">Fever</span><span class="card-value" style="color:#ef4444">🌡️ Yes</span></div>` : ''}
        ${entry.notes ? `<div class="card-notes">${escHtml(entry.notes)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="edit-btn" onclick="editEntry(${entry.id})">✏️ Edit</button>
        <button class="delete-btn" onclick="deleteEntry(${entry.id})">🗑️</button>
      </div>
    </div>`;
  });

  wrap.innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportData() {
  if (entries.length === 0) {
    showToast('No entries to export');
    return;
  }
  const data = JSON.stringify(entries, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'med-tracker-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup saved ✓');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Bad format');
      entries = imported;
      entries.sort((a, b) => a.day - b.day);
      save();
      updateUI();
      if (document.getElementById('historyView').classList.contains('hidden') === false) {
        renderHistory();
      }
      showToast('Imported ' + entries.length + ' entries ✓');
    } catch(err) {
      showToast('Import failed — bad file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

init();
</script>
</body>
</html>
