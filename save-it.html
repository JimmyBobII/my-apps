<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0818">
<title>Save It — Dragon Quest Edition</title>
<style>
@font-face {
  font-family: 'DQFont';
  src: local('Courier New');
}

:root {
  --bg: #0a0818;
  --bg-card: #110e24;
  --bg-window: #0d0a1e;
  --border-outer: #f0e0a0;
  --border-inner: #b89840;
  --border-dark: #584810;
  --text: #f0f0f0;
  --text-dim: #8888aa;
  --text-gold: #f0d860;
  --text-blue: #58a8f8;
  --gold: #f0d860;
  --gold-glow: rgba(240, 216, 96, 0.15);
  --green: #58d858;
  --green-glow: rgba(88, 216, 88, 0.12);
  --red: #f06868;
  --slime-blue: #38b0e8;
  --slime-dark: #2080b0;
  --slime-light: #80d8f8;
  --slime-eye: #f0f0f0;
  --slime-mouth: #404060;
  --font: 'Courier New', 'Courier', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px 0;
  -webkit-font-smoothing: antialiased;
  image-rendering: pixelated;
}

/* ── DQ-style window border ── */
.dq-window {
  position: relative;
  background: var(--bg-window);
  border: 3px solid var(--border-outer);
  border-radius: 8px;
  padding: 16px;
  box-shadow:
    inset 0 0 0 2px var(--border-dark),
    0 0 20px rgba(240, 216, 96, 0.06);
}

.dq-window::before {
  content: '';
  position: absolute;
  inset: 2px;
  border: 1px solid var(--border-inner);
  border-radius: 5px;
  pointer-events: none;
}

/* ── SVG Slime ── */
.slime-wrap {
  display: flex;
  justify-content: center;
  padding: 20px 0 4px;
  position: relative;
}

.slime-container {
  position: relative;
  width: 96px;
  height: 96px;
  animation: slimeBounce 2s ease-in-out infinite;
}

@keyframes slimeBounce {
  0%, 100% { transform: translateY(0) scaleY(1) scaleX(1); }
  30% { transform: translateY(-10px) scaleY(1.06) scaleX(0.96); }
  50% { transform: translateY(0) scaleY(0.92) scaleX(1.06); }
  70% { transform: translateY(-4px) scaleY(1.02) scaleX(0.99); }
}

.slime-container svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 4px 14px rgba(30, 120, 210, 0.3));
}

.slime-shadow {
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 64px;
  height: 10px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.35) 0%, transparent 70%);
  animation: shadowPulse 2s ease-in-out infinite;
}

@keyframes shadowPulse {
  0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.6; }
  30% { transform: translateX(-50%) scaleX(0.7); opacity: 0.3; }
  50% { transform: translateX(-50%) scaleX(1.15); opacity: 0.7; }
}

/* ── Header ── */
.header {
  padding: 16px 16px 0;
}

.title-bar {
  text-align: center;
  margin-bottom: 12px;
}

.title-bar h1 {
  font-size: 20px;
  color: var(--text-gold);
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(240, 216, 96, 0.3);
  text-transform: uppercase;
}

.title-bar .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── Gold display ── */
.gold-window {
  margin: 0 16px 4px;
}

.gold-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 4px 0;
}

.gold-coin {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #ffe880, #d4a820);
  border: 2px solid var(--border-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
  color: var(--border-dark);
  text-shadow: 0 1px 0 #ffe880;
  animation: coinSpin 4s linear infinite;
  box-shadow: 0 0 12px rgba(240, 216, 96, 0.25);
}

@keyframes coinSpin {
  0%, 100% { transform: scaleX(1); }
  25% { transform: scaleX(0.1); }
  50% { transform: scaleX(1); }
  75% { transform: scaleX(0.1); }
}

.gold-amount {
  font-size: 30px;
  font-weight: bold;
  color: var(--text-gold);
  text-shadow: 0 0 16px rgba(240, 216, 96, 0.25);
  letter-spacing: 1px;
}

.gold-sub {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── Level bar ── */
.level-bar-wrap {
  margin: 12px 16px 4px;
}

.level-info {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.level-name {
  font-size: 13px;
  color: var(--text-gold);
  font-weight: bold;
}

.level-next {
  font-size: 10px;
  color: var(--text-dim);
}

.level-track {
  height: 10px;
  background: #1a1830;
  border: 1px solid var(--border-dark);
  border-radius: 2px;
  overflow: hidden;
}

.level-fill {
  height: 100%;
  background: linear-gradient(90deg, #d04040, #f0d860, #58d858);
  transition: width 0.5s ease;
  box-shadow: 0 0 6px rgba(240, 216, 96, 0.4);
}

/* ── Navigation ── */
.nav {
  display: flex;
  gap: 4px;
  padding: 14px 16px;
}

.nav-btn {
  flex: 1;
  padding: 10px 6px;
  border: 2px solid var(--border-inner);
  border-radius: 4px;
  background: var(--bg-window);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-btn.active {
  background: var(--gold-glow);
  border-color: var(--border-outer);
  color: var(--text-gold);
  box-shadow: 0 0 10px rgba(240, 216, 96, 0.1);
}

.nav-cnt { font-size: 10px; opacity: 0.7; }

/* ── Sections ── */
.section { padding: 0 16px; }
.hidden { display: none !important; }

/* ── Form ── */
.field { margin-bottom: 18px; }

.label {
  display: block;
  font-size: 12px;
  color: var(--text-gold);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

input[type="text"], input[type="number"] {
  width: 100%;
  padding: 12px;
  border: 2px solid var(--border-inner);
  border-radius: 4px;
  background: #0d0a1e;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

input:focus { border-color: var(--border-outer); }
input::placeholder { color: #404060; }

.price-wrap {
  position: relative;
}

.price-prefix {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-gold);
  font-size: 18px;
  font-weight: bold;
}

.price-wrap input {
  padding-left: 28px;
  font-size: 20px;
  font-weight: bold;
  color: var(--text-gold);
}

.save-btn {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border-outer);
  border-radius: 4px;
  background: linear-gradient(180deg, #2a2050 0%, #1a1030 100%);
  color: var(--text-gold);
  font-family: var(--font);
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s;
  box-shadow: 0 0 16px rgba(240, 216, 96, 0.08);
}

.save-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  box-shadow: none;
}

.save-btn:not(:disabled):active {
  transform: scale(0.97);
  background: linear-gradient(180deg, #3a3060 0%, #2a2050 100%);
}

/* ── History cards ── */
.h-card {
  margin-bottom: 10px;
  padding: 14px;
}

.hc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.hc-item {
  font-size: 14px;
  font-weight: bold;
  color: var(--text);
  flex: 1;
}

.hc-gold {
  font-size: 16px;
  font-weight: bold;
  color: var(--text-gold);
  text-shadow: 0 0 8px rgba(240, 216, 96, 0.2);
}

.hc-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hc-date { font-size: 11px; color: var(--text-dim); }

.hc-status {
  font-size: 11px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid;
}

.hc-status.done {
  color: var(--green);
  border-color: rgba(88, 216, 88, 0.3);
  background: var(--green-glow);
}

.hc-status.pending {
  color: var(--text-gold);
  border-color: rgba(240, 216, 96, 0.3);
  background: var(--gold-glow);
  cursor: pointer;
}

.hc-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #1a1830;
}

.hc-btn {
  padding: 4px 10px;
  border: 1px solid var(--border-dark);
  border-radius: 3px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
}

.hc-btn:active { background: #1a1830; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 40px 16px; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }
.empty-text { font-size: 14px; color: var(--text-dim); }
.empty-sub { font-size: 11px; color: #404060; margin-top: 4px; }

/* ── Overlays ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.overlay.open { opacity: 1; pointer-events: auto; }

.overlay-box {
  max-width: 340px;
  width: 100%;
  text-align: center;
}

/* ── Confirm overlay ── */
.confirm-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  margin: 12px 0 16px;
}

.confirm-gold {
  font-size: 28px;
  font-weight: bold;
  color: var(--text-gold);
  text-shadow: 0 0 12px rgba(240, 216, 96, 0.3);
}

.confirm-item {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.confirm-prompt {
  font-size: 12px;
  color: var(--text-blue);
  line-height: 1.5;
  margin: 14px 0;
}

.overlay-btns {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-primary {
  padding: 12px;
  border: 2px solid var(--border-outer);
  border-radius: 4px;
  background: linear-gradient(180deg, #2a2050 0%, #1a1030 100%);
  color: var(--text-gold);
  font-family: var(--font);
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-secondary {
  padding: 10px;
  border: 1px solid var(--border-dark);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
}

/* ── Success overlay - DQ style message ── */
.success-msg-box {
  padding: 20px;
}

.success-icon { font-size: 40px; margin-bottom: 10px; }

.success-dq-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 12px;
  text-align: left;
}

.success-dq-text .highlight { color: var(--text-gold); }
.success-dq-text .green { color: var(--green); }

.success-total {
  font-size: 14px;
  color: var(--text-gold);
  margin: 10px 0 16px;
}

/* ── Typewriter cursor ── */
.cursor {
  display: inline-block;
  width: 10px;
  height: 16px;
  background: var(--text);
  margin-left: 2px;
  animation: blink 0.6s step-start infinite;
  vertical-align: text-bottom;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ── Delete confirm ── */
.del-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.del-modal.open { opacity: 1; pointer-events: auto; }

.del-box {
  max-width: 300px;
  width: 100%;
  text-align: center;
}

.del-box p {
  font-size: 13px;
  color: var(--text);
  margin-bottom: 16px;
}

.del-btns { display: flex; gap: 8px; }

.del-btns button {
  flex: 1;
  padding: 10px;
  border-radius: 4px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}

.del-keep {
  border: 1px solid var(--border-dark);
  background: transparent;
  color: var(--text-dim);
}

.del-yes {
  border: 2px solid var(--red);
  background: rgba(240, 104, 104, 0.1);
  color: var(--red);
}

/* ── Export ── */
.export-bar {
  display: flex;
  gap: 6px;
  padding: 14px 16px;
}

.export-btn {
  flex: 1;
  padding: 9px;
  border: 1px solid var(--border-dark);
  border-radius: 4px;
  background: var(--bg-window);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
}

.export-btn:active { background: #1a1830; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--bg-window);
  border: 2px solid var(--border-outer);
  color: var(--text-gold);
  padding: 8px 18px;
  border-radius: 4px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: bold;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.h-card { animation: fadeUp 0.25s ease both; }

/* ── Gold sparkle on save ── */
@keyframes sparkle {
  0% { opacity: 0; transform: scale(0) rotate(0deg); }
  50% { opacity: 1; transform: scale(1) rotate(180deg); }
  100% { opacity: 0; transform: scale(0) rotate(360deg); }
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--text-gold);
  border-radius: 1px;
  pointer-events: none;
  animation: sparkle 0.6s ease-out forwards;
}

</style>
</head>
<body>

<!-- Slime -->
<div class="slime-wrap">
  <div class="slime-container">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Body gradient - main blue -->
        <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#6DD8FF"/>
          <stop offset="40%" stop-color="#2EA8E0"/>
          <stop offset="75%" stop-color="#1B7CB8"/>
          <stop offset="100%" stop-color="#145F8A"/>
        </radialGradient>
        <!-- Specular highlight -->
        <radialGradient id="specGrad" cx="35%" cy="25%" r="30%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <!-- Eye white gradient -->
        <radialGradient id="eyeGrad" cx="45%" cy="40%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="100%" stop-color="#D8E8F0"/>
        </radialGradient>
      </defs>
      <!-- Main body - teardrop/onion shape -->
      <path d="M50 6 C50 6, 42 18, 30 32 C18 46, 10 58, 10 68 C10 82, 22 95, 50 95 C78 95, 90 82, 90 68 C90 58, 82 46, 70 32 C58 18, 50 6, 50 6Z" fill="url(#bodyGrad)" stroke="#0E5A80" stroke-width="1"/>
      <!-- Specular highlight on upper left -->
      <path d="M50 8 C50 8, 42 20, 32 33 C22 46, 14 58, 14 68 C14 78, 20 86, 34 90 C20 82, 16 72, 20 60 C24 48, 36 30, 50 8Z" fill="url(#specGrad)"/>
      <!-- Small bright highlight spot -->
      <ellipse cx="34" cy="32" rx="6" ry="8" fill="rgba(255,255,255,0.18)" transform="rotate(-20, 34, 32)"/>
      <!-- Left eye -->
      <ellipse cx="38" cy="62" rx="7.5" ry="8.5" fill="url(#eyeGrad)" stroke="#0E5A80" stroke-width="0.5"/>
      <ellipse cx="39.5" cy="62.5" rx="3.8" ry="4.5" fill="#1A1A2E"/>
      <ellipse cx="40.5" cy="61" rx="1.5" ry="1.8" fill="#FFFFFF"/>
      <!-- Right eye -->
      <ellipse cx="62" cy="62" rx="7.5" ry="8.5" fill="url(#eyeGrad)" stroke="#0E5A80" stroke-width="0.5"/>
      <ellipse cx="63.5" cy="62.5" rx="3.8" ry="4.5" fill="#1A1A2E"/>
      <ellipse cx="64.5" cy="61" rx="1.5" ry="1.8" fill="#FFFFFF"/>
      <!-- Mouth - friendly wide smile -->
      <path d="M38 76 Q42 83, 50 84 Q58 83, 62 76" fill="none" stroke="#0E4A6A" stroke-width="2" stroke-linecap="round"/>
      <!-- Subtle bottom edge shadow -->
      <ellipse cx="50" cy="93" rx="32" ry="2" fill="rgba(10,40,60,0.2)"/>
    </svg>
    <div class="slime-shadow"></div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="title-bar">
    <h1>Save It</h1>
    <div class="subtitle">Dragon Quest Edition</div>
  </div>
</div>

<!-- Gold window -->
<div class="gold-window dq-window">
  <div class="gold-display">
    <div class="gold-coin">G</div>
    <div class="gold-amount" id="totalGold">0 G</div>
  </div>
  <div class="gold-sub" id="goldSub"></div>
</div>

<!-- Level bar -->
<div class="level-bar-wrap">
  <div class="level-info">
    <span class="level-name" id="levelName">Lv.1 Slime</span>
    <span class="level-next" id="levelNext"></span>
  </div>
  <div class="level-track">
    <div class="level-fill" id="levelFill" style="width: 0%"></div>
  </div>
</div>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn active" id="navForm" onclick="showView('form')">Battle</button>
  <button class="nav-btn" id="navHistory" onclick="showView('history')">Journal <span class="nav-cnt" id="entryCount">0</span></button>
</div>

<!-- FORM VIEW -->
<div class="section" id="formView">
  <div class="dq-window" style="margin-bottom: 14px;">
    <div class="field">
      <label class="label">What tempts thee?</label>
      <input type="text" id="itemName" placeholder="The cursed impulse buy...">
    </div>
    <div class="field" style="margin-bottom: 0;">
      <label class="label">How much gold?</label>
      <div class="price-wrap">
        <span class="price-prefix">£</span>
        <input type="number" id="itemPrice" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>
  </div>
  <button class="save-btn" id="saveBtn" disabled onclick="handleSave()">Resist the Urge!</button>
</div>

<!-- HISTORY VIEW -->
<div class="section hidden" id="historyView"></div>

<!-- Export -->
<div class="export-bar">
  <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  <button class="export-btn" onclick="exportCSV()">Export CSV</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<!-- Confirm overlay -->
<div class="overlay" id="confirmOverlay">
  <div class="overlay-box dq-window">
    <div class="confirm-gold" id="confirmGold">£0.00</div>
    <div class="confirm-item" id="confirmItem"></div>
    <div class="confirm-prompt">Now transfer that exact amount to thy savings account. Thy future self shall be most grateful.</div>
    <div class="overlay-btns">
      <button class="btn-primary" onclick="confirmTransfer(true)">'Twas transferred!</button>
      <button class="btn-secondary" onclick="confirmTransfer(false)">I shall do it later</button>
    </div>
  </div>
</div>

<!-- Success overlay -->
<div class="overlay" id="successOverlay">
  <div class="overlay-box dq-window success-msg-box">
    <div class="success-icon" id="successIcon"></div>
    <div class="success-dq-text" id="successText"></div>
    <div class="success-total" id="successTotal"></div>
    <button class="btn-primary" onclick="closeSuccess()">Continue</button>
  </div>
</div>

<!-- Delete confirm -->
<div class="del-modal" id="delModal">
  <div class="del-box dq-window">
    <p>Erase this entry from the adventure log?</p>
    <div class="del-btns">
      <button class="del-keep" onclick="closeDelModal()">Nay</button>
      <button class="del-yes" id="delConfirmBtn">Aye</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'save-it-entries';

const LEVELS = [
  { name: 'Slime',          threshold: 0 },
  { name: 'She-Slime',      threshold: 25 },
  { name: 'Dracky',         threshold: 50 },
  { name: 'Chimaera',       threshold: 100 },
  { name: 'Golem',          threshold: 200 },
  { name: 'Knight Errant',  threshold: 350 },
  { name: 'Armamentalist',  threshold: 500 },
  { name: 'Paladin',        threshold: 750 },
  { name: 'Hero',           threshold: 1000 },
  { name: 'Erdrick',        threshold: 2000 },
  { name: 'Zenithian',      threshold: 5000 },
];

const DQ_MESSAGES = [
  { icon: '⚔️', text: (item, gold) => `<span class="highlight">Jimmy</span> resisted the urge to buy <span class="highlight">${item}</span>!\n\n<span class="green">${gold} gold</span> was saved to the treasury!` },
  { icon: '🛡️', text: (item, gold) => `The <span class="highlight">${item}</span> temptation attacks!\n\nBut <span class="highlight">Jimmy</span> defends!\n\n<span class="green">${gold} gold</span> protected!` },
  { icon: '✨', text: (item, gold) => `<span class="highlight">Jimmy</span> casts <span class="highlight">Kazing</span> on the wallet!\n\n<span class="green">${gold} gold</span> was recovered!` },
  { icon: '🏆', text: (item, gold) => `<span class="highlight">Jimmy</span> has defeated the <span class="highlight">${item}</span> impulse!\n\nReceived <span class="green">${gold} gold</span>!` },
  { icon: '💰', text: (item, gold) => `A treasure chest appears!\n\n<span class="highlight">Jimmy</span> found <span class="green">${gold} gold</span>\ninstead of wasting it on <span class="highlight">${item}</span>!` },
  { icon: '🐉', text: (item, gold) => `The <span class="highlight">${item}</span> Dragon breathes fire!\n\nBut <span class="highlight">Jimmy</span> is unfazed!\n\n<span class="green">${gold} gold</span> earned!` },
  { icon: '⭐', text: (item, gold) => `<span class="highlight">Jimmy</span> gained <span class="green">${gold} EXP</span>... wait, gold!\n\nThe <span class="highlight">${item}</span> was not needed after all.` },
  { icon: '🎪', text: (item, gold) => `<span class="highlight">Patty</span> at the tavern nods approvingly.\n\n"<span class="highlight">${gold} gold</span> saved instead of <span class="highlight">${item}</span>? Smart move, hero."` },
];

let entries = [];
let pendingEntry = null;
let pendingDeleteId = null;

function init() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) entries = JSON.parse(raw);
  } catch(e) {}

  document.getElementById('itemName').addEventListener('input', checkForm);
  document.getElementById('itemPrice').addEventListener('input', checkForm);
  updateUI();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function checkForm() {
  const name = document.getElementById('itemName').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  document.getElementById('saveBtn').disabled = !name || !price || price <= 0;
}

function getTotal() { return entries.reduce((s, e) => s + e.price, 0); }

function getLevel(total) {
  let level = LEVELS[0];
  let nextLevel = LEVELS[1] || null;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (total >= LEVELS[i].threshold) {
      level = LEVELS[i];
      nextLevel = LEVELS[i + 1] || null;
      break;
    }
  }
  return { current: level, next: nextLevel, index: LEVELS.indexOf(level) };
}

function updateUI() {
  const total = getTotal();
  document.getElementById('totalGold').textContent = total.toFixed(2) + ' G';

  const count = entries.length;
  document.getElementById('goldSub').textContent = count > 0
    ? count + ' impulse' + (count !== 1 ? 's' : '') + ' defeated'
    : 'Thy treasury awaits';

  document.getElementById('entryCount').textContent = count;

  // Level
  const lv = getLevel(total);
  const lvIdx = lv.index + 1;
  document.getElementById('levelName').textContent = `Lv.${lvIdx} ${lv.current.name}`;

  if (lv.next) {
    document.getElementById('levelNext').textContent = `${lv.next.threshold - total > 0 ? '£' + (lv.next.threshold - total).toFixed(0) : '0'} to ${lv.next.name}`;
    const progress = ((total - lv.current.threshold) / (lv.next.threshold - lv.current.threshold)) * 100;
    document.getElementById('levelFill').style.width = Math.min(100, Math.max(0, progress)) + '%';
  } else {
    document.getElementById('levelNext').textContent = 'MAX LEVEL';
    document.getElementById('levelFill').style.width = '100%';
  }
}

function handleSave() {
  const name = document.getElementById('itemName').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  if (!name || !price || price <= 0) return;

  pendingEntry = {
    id: Date.now(),
    item: name,
    price: price,
    date: new Date().toISOString(),
    transferred: false
  };

  document.getElementById('confirmGold').textContent = '£' + price.toFixed(2);
  document.getElementById('confirmItem').textContent = 'Instead of: ' + name;
  document.getElementById('confirmOverlay').classList.add('open');
}

function confirmTransfer(didTransfer) {
  document.getElementById('confirmOverlay').classList.remove('open');
  if (!pendingEntry) return;

  pendingEntry.transferred = didTransfer;
  entries.push(pendingEntry);
  save();
  updateUI();

  document.getElementById('itemName').value = '';
  document.getElementById('itemPrice').value = '';
  document.getElementById('saveBtn').disabled = true;

  // Show DQ success message
  const msg = DQ_MESSAGES[Math.floor(Math.random() * DQ_MESSAGES.length)];
  const goldStr = '£' + pendingEntry.price.toFixed(2);

  document.getElementById('successIcon').textContent = msg.icon;
  document.getElementById('successText').innerHTML = msg.text(escHtml(pendingEntry.item), goldStr).replace(/\n/g, '<br>');

  const totalNow = getTotal();
  document.getElementById('successTotal').textContent = 'Treasury: ' + totalNow.toFixed(2) + ' G';

  document.getElementById('successOverlay').classList.add('open');
  pendingEntry = null;
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('open');
}

function markTransferred(id) {
  entries = entries.map(e => e.id === id ? { ...e, transferred: true } : e);
  save();
  renderHistory();
  showToast('Transfer recorded!');
}

function requestDelete(id) {
  pendingDeleteId = id;
  document.getElementById('delModal').classList.add('open');
  document.getElementById('delConfirmBtn').onclick = () => {
    entries = entries.filter(e => e.id !== pendingDeleteId);
    save();
    closeDelModal();
    renderHistory();
    updateUI();
    showToast('Entry erased');
  };
}

function closeDelModal() {
  document.getElementById('delModal').classList.remove('open');
  pendingDeleteId = null;
}

function showView(v) {
  ['formView', 'historyView'].forEach(id => document.getElementById(id).classList.add('hidden'));
  ['navForm', 'navHistory'].forEach(id => document.getElementById(id).classList.remove('active'));

  if (v === 'form') {
    document.getElementById('formView').classList.remove('hidden');
    document.getElementById('navForm').classList.add('active');
  } else {
    document.getElementById('historyView').classList.remove('hidden');
    document.getElementById('navHistory').classList.add('active');
    renderHistory();
  }
}

function renderHistory() {
  const wrap = document.getElementById('historyView');
  if (entries.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-text">The adventure log is empty</div><div class="empty-sub">Resist thy first impulse to begin</div></div>';
    return;
  }

  let html = '';
  const sorted = [...entries].reverse();

  sorted.forEach((entry, i) => {
    const dateStr = new Date(entry.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    const statusClass = entry.transferred ? 'done' : 'pending';
    const statusText = entry.transferred ? 'Transferred' : 'Tap to confirm';
    const statusClick = entry.transferred ? '' : ` onclick="markTransferred(${entry.id})"`;

    html += `<div class="h-card dq-window" style="animation-delay: ${i * 0.04}s">
      <div class="hc-top">
        <span class="hc-item">${escHtml(entry.item)}</span>
        <span class="hc-gold">£${entry.price.toFixed(2)}</span>
      </div>
      <div class="hc-meta">
        <span class="hc-date">${dateStr}</span>
        <span class="hc-status ${statusClass}"${statusClick}>${statusText}</span>
      </div>
      <div class="hc-actions">
        <button class="hc-btn" onclick="requestDelete(${entry.id})">Erase</button>
      </div>
    </div>`;
  });

  wrap.innerHTML = html;
}

// Export
function exportJSON() {
  if (entries.length === 0) { showToast('Nothing to export'); return; }
  downloadFile(JSON.stringify(entries, null, 2), 'save-it-' + isoDate() + '.json', 'application/json');
  showToast('JSON exported!');
}

function exportCSV() {
  if (entries.length === 0) { showToast('Nothing to export'); return; }
  const headers = ['Item', 'Price', 'Date', 'Transferred'];
  const rows = entries.map(e => [
    csvEsc(e.item),
    e.price.toFixed(2),
    new Date(e.date).toLocaleDateString('en-GB'),
    e.transferred ? 'Yes' : 'No'
  ].join(','));
  downloadFile(headers.join(',') + '\n' + rows.join('\n'), 'save-it-' + isoDate() + '.csv', 'text/csv');
  showToast('CSV exported!');
}

function downloadFile(content, name, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();
      entries = imported;
      save();
      updateUI();
      showToast(entries.length + ' entries loaded!');
    } catch(err) {
      showToast('Import failed');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Helpers
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function csvEsc(s) { return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g, '""') + '"' : s; }
function isoDate() { return new Date().toISOString().slice(0, 10); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
