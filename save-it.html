<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c20">
<title>Save It — Dragon Quest Edition</title>
<style>
:root {
  /* Authentic DQ UI Colors */
  --bg: #0b112c;
  --bg-window: #040814; 
  --border-light: #ffffff;
  --text: #f8f8f8;
  --text-dim: #b0b8d0;
  --text-gold: #f8d848;
  --gold-glow: rgba(248, 216, 72, 0.15);
  --green: #68e868;
  --red: #f87070;
  --red-glow: rgba(248, 112, 112, 0.15);
  --font: 'Courier New', 'Courier', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px 0;
  -webkit-font-smoothing: antialiased;
  text-shadow: 1px 1px 0px #000;
}

/* ── Authentic DQ Window ── */
.dq-window { 
  position: relative; 
  background: var(--bg-window); 
  border: 3px solid var(--border-light); 
  border-radius: 6px; 
  padding: 16px; 
  box-shadow: inset 0 0 0 2px var(--bg-window), inset 0 0 0 4px var(--border-light), 0 4px 15px rgba(0,0,0,0.5); 
}

/* ── Header ── */
.header { padding: 24px 16px 12px; text-align: center; }
.header h1 { font-size: 24px; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;}
.header .subtitle { font-size: 13px; color: var(--text-dim); }

/* ── Slime Stage ── */
.slime-wrap {
  display: flex; justify-content: center; padding: 20px 0; position: relative;
}

.slime-container {
  position: relative; width: 120px; height: 120px;
  animation: slimeBounce 2.5s ease-in-out infinite;
}

@keyframes slimeBounce {
  0%, 100% { transform: translateY(0) scaleY(1) scaleX(1); }
  30% { transform: translateY(-8px) scaleY(1.04) scaleX(0.96); }
  50% { transform: translateY(0) scaleY(0.94) scaleX(1.04); }
  70% { transform: translateY(-3px) scaleY(1.02) scaleX(0.99); }
}

.slime-container svg { width: 100%; height: 100%; filter: drop-shadow(0 8px 6px rgba(0,0,0,0.5)); transition: filter 0.1s; }

/* Hit Animation for when you resist the urge */
.slime-container.hit svg { filter: brightness(2) drop-shadow(0 8px 6px rgba(0,0,0,0.5)); animation: shake 0.3s; }
@keyframes shake { 0% { transform: translateX(-4px); } 25% { transform: translateX(4px); } 50% { transform: translateX(-4px); } 75% { transform: translateX(4px); } 100% { transform: translateX(0); } }

/* The Slash Graphic */
.slash { position: absolute; inset: 0; background: linear-gradient(45deg, transparent 45%, #fff 48%, #fff 52%, transparent 55%); opacity: 0; pointer-events: none; transform: scale(1.5); }
.slime-container.hit .slash { animation: slashAnim 0.3s ease-out forwards; }
@keyframes slashAnim { 0% { opacity: 1; transform: scale(1.5) translate(-10px, -10px); } 100% { opacity: 0; transform: scale(1.5) translate(10px, 10px); } }

.slime-shadow {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 12px; background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
  animation: shadowPulse 2.5s ease-in-out infinite;
}

@keyframes shadowPulse {
  0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.8; }
  30% { transform: translateX(-50%) scaleX(0.8); opacity: 0.4; }
  50% { transform: translateX(-50%) scaleX(1.1); opacity: 0.9; }
}

/* ── Gold & EXP Dashboard ── */
.dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px 16px; }

.dash-box { padding: 12px; text-align: center; }
.dash-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
.dash-val { font-size: 20px; color: var(--text-gold); font-weight: bold; }

/* ── Authentic Level Bar ── */
.level-bar-wrap { margin: 0 16px 20px; padding: 12px; }
.level-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.level-name { font-size: 14px; color: var(--text-gold); font-weight: bold; text-transform: uppercase;}
.level-next { font-size: 11px; color: var(--text-dim); font-weight: bold;}

.level-track { height: 16px; background: #000; border: 2px solid var(--border-light); border-radius: 4px; overflow: hidden; padding: 2px; }
.level-fill { height: 100%; background: var(--green); transition: width 0.5s ease; border-right: 2px solid #fff;}

/* ── Command Menu (Navigation) ── */
.nav { display: flex; gap: 8px; padding: 0 16px 16px; }
.nav-btn {
  flex: 1; padding: 14px 6px; border: 2px solid var(--border-light); border-radius: 4px;
  background: var(--bg-window); color: var(--text-dim); font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
}
.nav-btn.active { background: var(--gold-glow); color: var(--text-gold); box-shadow: inset 0 0 10px rgba(240,216,96,0.2); }
.nav-cnt { font-size: 11px; opacity: 0.7; }

/* ── Sections ── */
.section { padding: 0 16px; }
.hidden { display: none !important; }

/* ── Battle Form ── */
.field { margin-bottom: 16px; }
.label { display: block; font-size: 13px; color: var(--text-gold); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }

input[type="text"], input[type="number"] {
  width: 100%; padding: 14px; border: 2px solid var(--border-light); border-radius: 4px;
  background: var(--bg-window); color: var(--text); font-family: var(--font); font-size: 16px; outline: none; transition: border-color 0.2s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); text-shadow: none;
}
input:focus { border-color: var(--text-gold); }
input::placeholder { color: #4a5480; }

.price-wrap { position: relative; }
.price-prefix { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-gold); font-size: 18px; font-weight: bold; text-shadow: none;}
.price-wrap input { padding-left: 36px; font-weight: bold; color: var(--text-gold); }

.save-btn {
  width: 100%; padding: 16px; border: 2px solid var(--border-light); border-radius: 4px;
  background: linear-gradient(180deg, #182868, #0b112c); color: var(--text-gold);
  font-family: var(--font); font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: all 0.2s; margin-top: 8px;
}
.save-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.save-btn:not(:disabled):active { transform: scale(0.97); background: #182868; }

/* ── Battle Log (History) ── */
.h-card { margin-bottom: 16px; padding: 16px; }
.hc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 8px;}
.hc-item { font-size: 15px; font-weight: bold; color: var(--text); flex: 1; }
.hc-gold { font-size: 16px; font-weight: bold; color: var(--text-gold); }

.hc-meta { display: flex; justify-content: space-between; align-items: center; }
.hc-date { font-size: 12px; color: var(--text-dim); }

.hc-status { font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 4px; border: 2px solid; text-transform: uppercase; }
.hc-status.done { color: var(--green); border-color: var(--green); background: rgba(104, 232, 104, 0.1); }
.hc-status.pending { color: var(--text-gold); border-color: var(--text-gold); background: var(--gold-glow); cursor: pointer; }

.hc-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
.hc-btn { padding: 6px 12px; border: 2px solid var(--border-light); border-radius: 4px; background: transparent; color: var(--text); font-family: var(--font); font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;}
.hc-btn:active { background: var(--red); border-color: var(--red); }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 48px 16px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; filter: grayscale(100%) opacity(0.5); }
.empty-text { font-size: 15px; color: var(--text-dim); font-weight: bold; }
.empty-sub { font-size: 13px; color: #4a5480; margin-top: 8px; }

/* ── Overlays ── */
.overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: auto; }
.overlay-box { max-width: 380px; width: 100%; text-align: center; }

/* ── Confirm overlay ── */
.confirm-gold { font-size: 32px; font-weight: bold; color: var(--text-gold); margin-top: 8px; }
.confirm-item { font-size: 14px; color: var(--text-dim); margin-top: 8px; font-weight: bold; text-transform: uppercase; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 16px;}
.confirm-prompt { font-size: 14px; color: var(--text); line-height: 1.6; margin: 20px 0; font-weight: bold;}

.overlay-btns { display: flex; flex-direction: column; gap: 12px; }
.btn-primary { padding: 16px; border: 2px solid var(--border-light); border-radius: 4px; background: linear-gradient(180deg, #182868, #0b112c); color: var(--text-gold); font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
.btn-secondary { padding: 14px; border: 2px solid var(--border-light); border-radius: 4px; background: transparent; color: var(--text); font-family: var(--font); font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

/* ── Success overlay ── */
.success-msg-box { padding: 24px; }
.success-icon { font-size: 48px; margin-bottom: 16px; filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.5));}
.success-dq-text { font-size: 16px; color: var(--text); line-height: 1.8; margin-bottom: 20px; text-align: left; }
.success-dq-text .highlight { color: var(--text-gold); font-weight: bold;}
.success-dq-text .green { color: var(--green); font-weight: bold;}
.success-total { font-size: 16px; color: var(--text-gold); margin: 16px 0 24px; font-weight: bold; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 16px;}

.del-box p { font-size: 15px; color: var(--text); margin-bottom: 20px; line-height: 1.5; font-weight: bold;}
.del-btns { display: flex; gap: 12px; }
.del-btns button { flex: 1; padding: 14px; border-radius: 4px; font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase;}
.del-keep { border: 2px solid var(--border-light); background: transparent; color: var(--text); }
.del-yes { border: 2px solid var(--red); background: var(--red-glow); color: var(--red); }

/* ── Export ── */
.export-bar { display: flex; gap: 8px; padding: 24px 16px; }
.export-btn { flex: 1; padding: 12px; border: 2px solid rgba(255,255,255,0.3); border-radius: 4px; background: transparent; color: var(--text-dim); font-family: var(--font); font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;}

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--bg-window); border: 2px solid var(--border-light); color: var(--text-gold); padding: 12px 24px; border-radius: 4px; font-family: var(--font); font-size: 14px; font-weight: bold; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.h-card { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="title-bar">
    <h1>Save It</h1>
    <div class="subtitle">Treasury Management</div>
  </div>
</div>

<div class="slime-wrap">
  <div class="slime-shadow"></div>
  <div class="slime-container" id="slimeModel">
    <div class="slash"></div>
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#6DD8FF"/>
          <stop offset="40%" stop-color="#2EA8E0"/>
          <stop offset="75%" stop-color="#1B7CB8"/>
          <stop offset="100%" stop-color="#145F8A"/>
        </radialGradient>
        <radialGradient id="specGrad" cx="35%" cy="25%" r="30%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <path d="M50 6 C50 6, 42 18, 30 32 C18 46, 10 58, 10 68 C10 82, 22 95, 50 95 C78 95, 90 82, 90 68 C90 58, 82 46, 70 32 C58 18, 50 6, 50 6Z" fill="url(#bodyGrad)" stroke="#0E5A80" stroke-width="1"/>
      <path d="M50 8 C50 8, 42 20, 32 33 C22 46, 14 58, 14 68 C14 78, 20 86, 34 90 C20 82, 16 72, 20 60 C24 48, 36 30, 50 8Z" fill="url(#specGrad)"/>
      <ellipse cx="38" cy="62" rx="7.5" ry="8.5" fill="#fff" stroke="#0E5A80" stroke-width="0.5"/>
      <ellipse cx="39.5" cy="62.5" rx="3.8" ry="4.5" fill="#1A1A2E"/>
      <ellipse cx="40.5" cy="61" rx="1.5" ry="1.8" fill="#FFFFFF"/>
      <ellipse cx="62" cy="62" rx="7.5" ry="8.5" fill="#fff" stroke="#0E5A80" stroke-width="0.5"/>
      <ellipse cx="63.5" cy="62.5" rx="3.8" ry="4.5" fill="#1A1A2E"/>
      <ellipse cx="64.5" cy="61" rx="1.5" ry="1.8" fill="#FFFFFF"/>
      <path d="M38 76 Q42 83, 50 84 Q58 83, 62 76" fill="none" stroke="#0E4A6A" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="dashboard">
  <div class="dash-box dq-window">
    <div class="dash-label">Treasury</div>
    <div class="dash-val" id="totalGold">0 G</div>
  </div>
  <div class="dash-box dq-window">
    <div class="dash-label">Impulses Defeated</div>
    <div class="dash-val" id="totalSaves" style="color: var(--text);">0</div>
  </div>
</div>

<div class="level-bar-wrap dq-window">
  <div class="level-info">
    <span class="level-name" id="levelName">Lv.1 Slime</span>
    <span class="level-next" id="levelNext"></span>
  </div>
  <div class="level-track">
    <div class="level-fill" id="levelFill" style="width: 0%"></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" id="navForm" onclick="showView('form')">Battle</button>
  <button class="nav-btn" id="navHistory" onclick="showView('history')">Battle Log (<span id="entryCount">0</span>)</button>
</div>

<div class="section" id="formView">
  <div class="dq-window" style="margin-bottom: 16px;">
    <div class="field">
      <label class="label">What monster tempts thee?</label>
      <input type="text" id="itemName" placeholder="e.g. Unnecessary Coffee">
    </div>
    <div class="field" style="margin-bottom: 0;">
      <label class="label">Its Power Level (Gold)</label>
      <div class="price-wrap">
        <span class="price-prefix">£</span>
        <input type="number" id="itemPrice" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>
  </div>
  <button class="save-btn" id="saveBtn" disabled onclick="handleSave()">Resist the Urge!</button>
</div>

<div class="section hidden" id="historyView"></div>

<div class="export-bar">
  <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  <button class="export-btn" onclick="exportCSV()">Export CSV</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">Import File</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="overlay" id="confirmOverlay">
  <div class="overlay-box dq-window">
    <div class="confirm-item" id="confirmItem"></div>
    <div class="confirm-gold" id="confirmGold">£0.00</div>
    <div class="confirm-prompt">Transfer this exact amount to thy sacred savings account immediately.</div>
    <div class="overlay-btns">
      <button class="btn-primary" onclick="confirmTransfer(true)">It is done!</button>
      <button class="btn-secondary" onclick="confirmTransfer(false)">I shall cast it later</button>
    </div>
  </div>
</div>

<div class="overlay" id="successOverlay">
  <div class="overlay-box dq-window success-msg-box">
    <div class="success-icon" id="successIcon"></div>
    <div class="success-dq-text" id="successText"></div>
    <div class="success-total" id="successTotal"></div>
    <button class="btn-primary" onclick="closeSuccess()">Continue Quest</button>
  </div>
</div>

<div class="overlay" id="delModal">
  <div class="overlay-box dq-window">
    <p>Art thou sure thou wisheth to erase this battle from history entirely?</p>
    <div class="del-btns">
      <button class="del-keep" onclick="closeDelModal()">Nay</button>
      <button class="del-yes" id="delConfirmBtn">Aye</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'save-it-entries';

const LEVELS = [
  { name: 'Slime',          threshold: 0 },
  { name: 'She-Slime',      threshold: 25 },
  { name: 'Dracky',         threshold: 50 },
  { name: 'Chimaera',       threshold: 100 },
  { name: 'Golem',          threshold: 200 },
  { name: 'Knight Errant',  threshold: 350 },
  { name: 'Armamentalist',  threshold: 500 },
  { name: 'Paladin',        threshold: 750 },
  { name: 'Hero',           threshold: 1000 },
  { name: 'Erdrick',        threshold: 2000 },
  { name: 'Zenithian',      threshold: 5000 },
];

const DQ_MESSAGES = [
  { icon: '⚔️', text: (item, gold) => `Thou hast resisted the <span class="highlight">${item}</span>!\n\n<span class="green">${gold} gold</span> was saved to the treasury!` },
  { icon: '🛡️', text: (item, gold) => `The <span class="highlight">${item}</span> attacks!\n\nBut thou defendest perfectly!\n\n<span class="green">${gold} gold</span> protected!` },
  { icon: '✨', text: (item, gold) => `Thou castest <span class="highlight">Kazing</span> on thy wallet!\n\n<span class="green">${gold} gold</span> was recovered from certain doom!` },
  { icon: '🏆', text: (item, gold) => `Thou hast defeated the <span class="highlight">${item}</span> impulse!\n\nReceived <span class="green">${gold} gold</span>!` },
  { icon: '💰', text: (item, gold) => `A treasure chest appears!\n\nThou foundest <span class="green">${gold} gold</span>\ninstead of wasting it on <span class="highlight">${item}</span>!` },
  { icon: '🐉', text: (item, gold) => `The <span class="highlight">${item}</span> Dragon breathes fire!\n\nBut thou art unfazed!\n\n<span class="green">${gold} gold</span> safely stored away!` }
];

let entries = [];
let pendingEntry = null;
let pendingDeleteId = null;

function init() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) entries = JSON.parse(raw);
  } catch(e) {}

  document.getElementById('itemName').addEventListener('input', checkForm);
  document.getElementById('itemPrice').addEventListener('input', checkForm);
  updateUI();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function checkForm() {
  const name = document.getElementById('itemName').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  document.getElementById('saveBtn').disabled = !name || !price || price <= 0;
}

function getTotal() { return entries.reduce((s, e) => s + e.price, 0); }

function getLevel(total) {
  let level = LEVELS[0];
  let nextLevel = LEVELS[1] || null;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (total >= LEVELS[i].threshold) {
      level = LEVELS[i];
      nextLevel = LEVELS[i + 1] || null;
      break;
    }
  }
  return { current: level, next: nextLevel, index: LEVELS.indexOf(level) };
}

function updateUI() {
  const total = getTotal();
  document.getElementById('totalGold').textContent = total.toFixed(2) + ' G';

  const count = entries.length;
  document.getElementById('totalSaves').textContent = count;
  document.getElementById('entryCount').textContent = count;

  const lv = getLevel(total);
  const lvIdx = lv.index + 1;
  document.getElementById('levelName').textContent = `Lv.${lvIdx} ${lv.current.name}`;

  if (lv.next) {
    document.getElementById('levelNext').textContent = `${lv.next.threshold - total > 0 ? '£' + (lv.next.threshold - total).toFixed(0) : '0'} to Next`;
    const progress = ((total - lv.current.threshold) / (lv.next.threshold - lv.current.threshold)) * 100;
    document.getElementById('levelFill').style.width = Math.min(100, Math.max(0, progress)) + '%';
  } else {
    document.getElementById('levelNext').textContent = 'MAX LEVEL';
    document.getElementById('levelFill').style.width = '100%';
  }
}

function handleSave() {
  const name = document.getElementById('itemName').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  if (!name || !price || price <= 0) return;

  // Trigger Hit Animation
  const slime = document.getElementById('slimeModel');
  slime.classList.remove('hit');
  void slime.offsetWidth; // Trigger reflow
  slime.classList.add('hit');

  setTimeout(() => {
    pendingEntry = {
      id: Date.now(),
      item: name,
      price: price,
      date: new Date().toISOString(),
      transferred: false
    };

    document.getElementById('confirmGold').textContent = '£' + price.toFixed(2);
    document.getElementById('confirmItem').textContent = 'Defeated: ' + name;
    document.getElementById('confirmOverlay').classList.add('open');
  }, 400); // Wait for animation before showing modal
}

function confirmTransfer(didTransfer) {
  document.getElementById('confirmOverlay').classList.remove('open');
  if (!pendingEntry) return;

  pendingEntry.transferred = didTransfer;
  entries.push(pendingEntry);
  save();
  updateUI();

  document.getElementById('itemName').value = '';
  document.getElementById('itemPrice').value = '';
  document.getElementById('saveBtn').disabled = true;

  const msg = DQ_MESSAGES[Math.floor(Math.random() * DQ_MESSAGES.length)];
  const goldStr = '£' + pendingEntry.price.toFixed(2);

  document.getElementById('successIcon').textContent = msg.icon;
  document.getElementById('successText').innerHTML = msg.text(escHtml(pendingEntry.item), goldStr).replace(/\n/g, '<br>');

  const totalNow = getTotal();
  document.getElementById('successTotal').textContent = 'Current Treasury: ' + totalNow.toFixed(2) + ' G';

  document.getElementById('successOverlay').classList.add('open');
  pendingEntry = null;
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('open');
}

function markTransferred(id) {
  entries = entries.map(e => e.id === id ? { ...e, transferred: true } : e);
  save();
  renderHistory();
  showToast('Treasury updated!');
}

function requestDelete(id) {
  pendingDeleteId = id;
  document.getElementById('delModal').classList.add('open');
  document.getElementById('delConfirmBtn').onclick = () => {
    entries = entries.filter(e => e.id !== pendingDeleteId);
    save();
    closeDelModal();
    renderHistory();
    updateUI();
    showToast('Battle erased from history.');
  };
}

function closeDelModal() {
  document.getElementById('delModal').classList.remove('open');
  pendingDeleteId = null;
}

function showView(v) {
  ['formView', 'historyView'].forEach(id => document.getElementById(id).classList.add('hidden'));
  ['navForm', 'navHistory'].forEach(id => document.getElementById(id).classList.remove('active'));

  if (v === 'form') {
    document.getElementById('formView').classList.remove('hidden');
    document.getElementById('navForm').classList.add('active');
  } else {
    document.getElementById('historyView').classList.remove('hidden');
    document.getElementById('navHistory').classList.add('active');
    renderHistory();
  }
}

function renderHistory() {
  const wrap = document.getElementById('historyView');
  if (entries.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-text">The battle log is empty.</div><div class="empty-sub">Resist thy first impulse to begin.</div></div>';
    return;
  }

  let html = '';
  const sorted = [...entries].reverse();

  sorted.forEach((entry, i) => {
    const dateStr = new Date(entry.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    const statusClass = entry.transferred ? 'done' : 'pending';
    const statusText = entry.transferred ? 'Transferred' : 'Tap to Transfer';
    const statusClick = entry.transferred ? '' : ` onclick="markTransferred(${entry.id})"`;

    html += `<div class="h-card dq-window" style="animation-delay: ${i * 0.04}s">
      <div class="hc-top">
        <span class="hc-item">${escHtml(entry.item)}</span>
        <span class="hc-gold">£${entry.price.toFixed(2)}</span>
      </div>
      <div class="hc-meta">
        <span class="hc-date">${dateStr}</span>
        <span class="hc-status ${statusClass}"${statusClick}>${statusText}</span>
      </div>
      <div class="hc-actions">
        <button class="hc-btn" onclick="requestDelete(${entry.id})">Erase Log</button>
      </div>
    </div>`;
  });

  wrap.innerHTML = html;
}

function exportJSON() {
  if (entries.length === 0) { showToast('No data to export!'); return; }
  downloadFile(JSON.stringify(entries, null, 2), 'save-it-' + isoDate() + '.json', 'application/json');
  showToast('Treasury records exported!');
}

function exportCSV() {
  if (entries.length === 0) { showToast('No data to export!'); return; }
  const headers = ['Defeated Impulse', 'Gold Saved', 'Date', 'Transferred to Savings'];
  const rows = entries.map(e => [
    csvEsc(e.item),
    e.price.toFixed(2),
    new Date(e.date).toLocaleDateString('en-GB'),
    e.transferred ? 'Yes' : 'No'
  ].join(','));
  downloadFile(headers.join(',') + '\n' + rows.join('\n'), 'save-it-' + isoDate() + '.csv', 'text/csv');
  showToast('Treasury records exported!');
}

function downloadFile(content, name, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();
      entries = imported;
      save();
      updateUI();
      if(!document.getElementById('historyView').classList.contains('hidden')){
        renderHistory();
      }
      showToast(entries.length + ' battles restored!');
    } catch(err) {
      showToast('The ancient magic failed. (Import error)');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function csvEsc(s) { return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g, '""') + '"' : s; }
function isoDate() { return new Date().toISOString().slice(0, 10); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
