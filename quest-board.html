<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101848">
<title>Hero's Quest Board</title>
<style>
:root{
  --bg:#101848;--bg2:#0c1240;--border-o:#f8f0e0;--border-i:#c8b878;--border-d:#485090;
  --text:#f8f8f8;--dim:#a0a8d0;--gold:#f8d848;--blue:#68c0f8;--green:#68e868;--red:#f87070;
  --gg:rgba(248,216,72,0.12);--font:'Courier New','Courier',monospace;
  --common:#b0b8d0;--uncommon:#68e868;--rare:#68c0f8;--epic:#d088f8;--legendary:#f8d848;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--text);font-family:var(--font);max-width:480px;margin:0 auto;padding:0 0 80px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.dq{position:relative;background:linear-gradient(180deg,#182058,#101848);border:3px solid var(--border-o);border-radius:10px;padding:14px;box-shadow:inset 0 0 0 2px var(--border-d),0 4px 16px rgba(0,0,0,.3)}
.dq::before{content:'';position:absolute;inset:2px;border:1px solid var(--border-i);border-radius:7px;pointer-events:none}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
.hdr-creature{width:36px;height:36px;cursor:pointer;animation:float 3s ease-in-out infinite}
.hdr-creature svg{width:100%;height:100%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.hdr-info{flex:1}
.hdr-name{font-size:14px;font-weight:bold;color:var(--gold);letter-spacing:1px}
.hdr-class{font-size:10px;color:var(--dim)}
.hdr-lvl{font-size:11px;font-weight:bold;color:var(--gold);background:var(--gg);border:1px solid rgba(240,216,96,.2);padding:4px 10px;border-radius:12px}

/* EXP bar */
.exp-bar{margin:0 16px 4px;height:10px;background:rgba(0,0,0,.25);border:1px solid var(--border-d);border-radius:2px;overflow:hidden;position:relative}
.exp-fill{height:100%;background:linear-gradient(90deg,#4040d0,#58a8f8,#58d858);transition:width .6s;border-radius:2px}
.exp-text{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:bold;color:rgba(255,255,255,.7);text-shadow:0 0 4px rgba(0,0,0,.8)}

/* Gold display */
.gold-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 16px 8px}
.gold-coin{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffe880,#d4a820);border:1px solid var(--border-d);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:bold;color:var(--border-d)}
.gold-amt{font-size:14px;font-weight:bold;color:var(--gold)}

/* Nav */
.nav{display:flex;gap:3px;padding:0 12px 10px}
.nav-btn{flex:1;padding:8px 2px;border:2px solid var(--border-d);border-radius:4px;background:linear-gradient(180deg,#182058,#101848);color:var(--dim);font-family:var(--font);font-size:9px;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;transition:all .15s;text-align:center}
.nav-btn.active{background:var(--gg);border-color:var(--border-o);color:var(--gold)}

/* Sections */
.sec{padding:0 12px;position:relative;z-index:1}
.hidden{display:none!important}

/* ── QUESTS TAB ── */
.quest-card{margin-bottom:8px;padding:12px;display:flex;align-items:center;gap:10px}
.quest-check{width:32px;height:32px;border-radius:8px;border:2px solid var(--border-d);background:rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0}
.quest-check.done{border-color:var(--green);background:rgba(88,216,88,.1)}
.quest-check.maxed{border-color:var(--dim);background:rgba(120,120,160,.05);opacity:.5;cursor:default}
.quest-body{flex:1;min-width:0}
.quest-name{font-size:13px;font-weight:bold;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quest-meta{font-size:10px;color:var(--dim);margin-top:2px}
.quest-meta .xp{color:var(--blue)}
.quest-meta .gp{color:var(--gold)}
.quest-count{font-size:10px;color:var(--dim);margin-top:1px}
.quest-del{padding:4px 8px;border:1px solid var(--border-d);border-radius:3px;background:transparent;color:var(--dim);font-family:var(--font);font-size:10px;cursor:pointer;flex-shrink:0}

.add-quest-btn{width:100%;padding:12px;border:2px dashed var(--border-d);border-radius:8px;background:transparent;color:var(--dim);font-family:var(--font);font-size:12px;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;transition:all .2s}
.add-quest-btn:active{border-color:var(--border-i);color:var(--gold)}

/* ── HERO TAB ── */
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.hero-stat{padding:12px;text-align:center}
.hs-val{font-size:22px;font-weight:bold;color:var(--gold)}
.hs-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.class-progression{margin-bottom:12px}
.cp-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.cp-list{display:flex;flex-wrap:wrap;gap:4px}
.cp-badge{padding:4px 8px;border-radius:3px;border:1px solid var(--border-d);font-size:10px;font-weight:bold;color:var(--dim)}
.cp-badge.achieved{border-color:var(--green);color:var(--green);background:rgba(88,216,88,.08)}
.cp-badge.current{border-color:var(--gold);color:var(--gold);background:var(--gg)}

/* ── SHOP TAB ── */
.shop-cats{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.shop-cat{padding:5px 10px;border:1px solid var(--border-d);border-radius:3px;background:transparent;color:var(--dim);font-family:var(--font);font-size:9px;font-weight:bold;cursor:pointer;text-transform:uppercase}
.shop-cat.active{border-color:var(--border-i);color:var(--gold);background:var(--gg)}

.shop-item{margin-bottom:6px;padding:10px;display:flex;align-items:center;gap:10px}
.si-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.si-info{flex:1;min-width:0}
.si-name{font-size:12px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-desc{font-size:9px;color:var(--dim);margin-top:1px;line-height:1.3}
.si-rarity{font-size:8px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px}
.si-buy{padding:5px 10px;border:2px solid var(--border-i);border-radius:4px;background:linear-gradient(180deg,#283880,#182058);color:var(--gold);font-family:var(--font);font-size:10px;font-weight:bold;cursor:pointer;flex-shrink:0;white-space:nowrap}
.si-buy:disabled{opacity:.3;cursor:not-allowed}
.si-buy.owned{border-color:var(--green);color:var(--green);background:rgba(88,216,88,.08)}

/* ── TREASURY TAB ── */
.treasury-stats{display:flex;gap:8px;margin-bottom:10px}
.ts-pill{flex:1;text-align:center;padding:8px 4px;background:linear-gradient(180deg,#182058,#101848);border:1px solid var(--border-d);border-radius:4px}
.ts-val{font-size:16px;font-weight:bold;color:var(--gold)}
.ts-label{font-size:8px;color:var(--dim);text-transform:uppercase}

.treasury-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.tg-item{aspect-ratio:1;border:2px solid var(--border-d);border-radius:6px;background:linear-gradient(180deg,#182058,#101848);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;transition:all .15s}
.tg-item.empty{opacity:.2;font-size:14px}
.tg-item.owned{border-color:var(--border-i)}
.tg-item .tg-rarity{position:absolute;bottom:1px;right:2px;width:5px;height:5px;border-radius:50%}

/* ── LOOT LOG ── */
.loot-entry{margin-bottom:6px;padding:10px;display:flex;align-items:center;gap:8px}
.le-icon{font-size:18px;flex-shrink:0}
.le-text{font-size:11px;color:var(--text);flex:1}
.le-text .hl{color:var(--gold)}
.le-date{font-size:9px;color:var(--dim);flex-shrink:0}

/* ── Overlays ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
.overlay.center{align-items:center}
.ov-box{max-width:440px;width:100%;padding:16px;margin-bottom:16px}

.ov-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block}
.ov-input{width:100%;padding:10px;border:2px solid var(--border-i);border-radius:4px;background:rgba(0,0,0,.2);color:var(--text);font-family:var(--font);font-size:14px;outline:none;margin-bottom:10px}
.ov-input:focus{border-color:var(--border-o)}
.ov-input::placeholder{color:#6068a0}
.ov-row{display:flex;gap:8px;margin-bottom:10px}
.ov-row .ov-field{flex:1}
.ov-row .ov-field label{font-size:9px;color:var(--dim);display:block;margin-bottom:4px;text-transform:uppercase}
.ov-row .ov-field input,.ov-row .ov-field select{width:100%;padding:8px;border:1px solid var(--border-d);border-radius:4px;background:linear-gradient(180deg,#182058,#101848);color:var(--text);font-family:var(--font);font-size:13px;outline:none}
.ov-row .ov-field select{-webkit-appearance:none}
.ov-btns{display:flex;gap:8px}
.ov-btns button{flex:1;padding:10px;border-radius:4px;font-family:var(--font);font-size:12px;font-weight:bold;cursor:pointer;text-transform:uppercase}
.ov-save{border:2px solid var(--border-o);background:linear-gradient(180deg,#283880,#182058);color:var(--gold)}
.ov-cancel{border:1px solid var(--border-d);background:transparent;color:var(--dim)}

/* Level up overlay */
.lvl-up-box{text-align:center;padding:24px}
.lvl-up-icon{font-size:48px;margin-bottom:8px;animation:lvlPulse 1s ease-in-out infinite}
@keyframes lvlPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.lvl-up-text{font-size:18px;font-weight:bold;color:var(--gold);text-shadow:0 0 16px rgba(240,216,96,.3);margin-bottom:4px}
.lvl-up-class{font-size:13px;color:var(--text);margin-bottom:6px}
.lvl-up-sub{font-size:11px;color:var(--dim);margin-bottom:16px;line-height:1.5}
.lvl-up-btn{padding:12px 32px;border:2px solid var(--border-o);border-radius:4px;background:linear-gradient(180deg,#283880,#182058);color:var(--gold);font-family:var(--font);font-size:13px;font-weight:bold;cursor:pointer;text-transform:uppercase}

/* Loot drop overlay */
.loot-box{text-align:center;padding:24px}
.loot-icon{font-size:48px;margin-bottom:8px;animation:lootBounce .6s ease}
@keyframes lootBounce{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.loot-text{font-size:14px;color:var(--text);margin-bottom:4px}
.loot-name{font-size:16px;font-weight:bold;margin-bottom:4px}
.loot-desc{font-size:11px;color:var(--dim);margin-bottom:14px;line-height:1.4}
.loot-btn{padding:10px 28px;border:2px solid var(--border-o);border-radius:4px;background:linear-gradient(180deg,#283880,#182058);color:var(--gold);font-family:var(--font);font-size:12px;font-weight:bold;cursor:pointer;text-transform:uppercase}

/* Item detail overlay */
.item-detail{text-align:center;padding:20px}
.id-icon{font-size:48px;margin-bottom:6px}
.id-name{font-size:16px;font-weight:bold;margin-bottom:4px}
.id-rarity{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.id-desc{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:14px}
.id-close{padding:10px 28px;border:2px solid var(--border-o);border-radius:4px;background:linear-gradient(180deg,#283880,#182058);color:var(--gold);font-family:var(--font);font-size:12px;font-weight:bold;cursor:pointer;text-transform:uppercase}

/* Export */
.export-bar{display:flex;gap:6px;padding:10px 12px}
.export-btn{flex:1;padding:8px;border:1px solid var(--border-d);border-radius:4px;background:linear-gradient(180deg,#182058,#101848);color:var(--dim);font-family:var(--font);font-size:9px;font-weight:bold;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:linear-gradient(180deg,#182058,#101848);border:2px solid var(--border-o);color:var(--gold);padding:8px 18px;border-radius:4px;font-family:var(--font);font-size:12px;font-weight:bold;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Particle container for level ups */
.particle-overlay{position:fixed;inset:0;pointer-events:none;z-index:150}
.lvl-particle{position:absolute;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(240,216,96,.5)}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.quest-card,.shop-item,.loot-entry,.tg-item{animation:fadeUp .2s ease both}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-creature" id="creatureWrap" onclick="spawnCreature()"></div>
  <div class="hdr-info">
    <div class="hdr-name">Jimmy</div>
    <div class="hdr-class" id="hdrClass">Lv.1 Slime</div>
  </div>
  <div class="hdr-lvl" id="hdrLvl">Lv.1</div>
</div>
<div class="exp-bar"><div class="exp-fill" id="expFill" style="width:0%"></div><div class="exp-text" id="expText">0 / 100 EXP</div></div>
<div class="gold-bar"><div class="gold-coin">G</div><div class="gold-amt" id="goldAmt">0 G</div></div>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn active" id="navQuests" onclick="showTab('quests')">⚔️ Quests</button>
  <button class="nav-btn" id="navHero" onclick="showTab('hero')">🛡️ Hero</button>
  <button class="nav-btn" id="navShop" onclick="showTab('shop')">🏪 Shop</button>
  <button class="nav-btn" id="navTreasury" onclick="showTab('treasury')">👑 Loot</button>
  <button class="nav-btn" id="navLootlog" onclick="showTab('lootlog')">📜 Log</button>
</div>

<!-- QUESTS -->
<div class="sec" id="secQuests">
  <div id="questList"></div>
  <button class="add-quest-btn" onclick="showAddQuest()">+ Add New Quest</button>
</div>

<!-- HERO -->
<div class="sec hidden" id="secHero">
  <div class="hero-stats" id="heroStats"></div>
  <div class="class-progression"><div class="cp-title">Class Progression</div><div class="cp-list" id="classList"></div></div>
</div>

<!-- SHOP -->
<div class="sec hidden" id="secShop">
  <div class="shop-cats" id="shopCats"></div>
  <div id="shopList"></div>
</div>

<!-- TREASURY -->
<div class="sec hidden" id="secTreasury">
  <div class="treasury-stats" id="treasuryStats"></div>
  <div class="treasury-grid" id="treasuryGrid"></div>
</div>

<!-- LOOT LOG -->
<div class="sec hidden" id="secLootlog">
  <div id="lootLogList"></div>
</div>

<!-- Export -->
<div class="export-bar">
  <button class="export-btn" onclick="exportJSON()">Export</button>
  <button class="export-btn" onclick="document.getElementById('importFile').click()">Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <button class="export-btn" onclick="if(confirm('Reset ALL data?')){localStorage.removeItem(SK);location.reload()}">Reset</button>
</div>

<!-- Add Quest overlay -->
<div class="overlay" id="addQuestOv">
  <div class="ov-box dq">
    <div class="ov-label">New Quest</div>
    <input class="ov-input" id="qName" placeholder="Quest name..." maxlength="50">
    <div class="ov-row">
      <div class="ov-field"><label>EXP</label><input type="number" id="qExp" value="10" min="1" max="500"></div>
      <div class="ov-field"><label>Gold</label><input type="number" id="qGold" value="5" min="0" max="500"></div>
    </div>
    <div class="ov-row">
      <div class="ov-field"><label>Type</label>
        <select id="qType"><option value="daily">Once Daily</option><option value="repeat">Repeatable</option></select>
      </div>
      <div class="ov-field"><label>Max/Day (repeat)</label><input type="number" id="qMax" value="0" min="0" max="99" placeholder="0=unlimited"></div>
    </div>
    <div class="ov-btns">
      <button class="ov-cancel" onclick="closeOv('addQuestOv')">Cancel</button>
      <button class="ov-save" onclick="saveQuest()">Create</button>
    </div>
  </div>
</div>

<!-- Level Up overlay -->
<div class="overlay center" id="lvlUpOv">
  <div class="ov-box dq lvl-up-box">
    <div class="lvl-up-icon">⚔️</div>
    <div class="lvl-up-text" id="lvlUpText">Level Up!</div>
    <div class="lvl-up-class" id="lvlUpClass"></div>
    <div class="lvl-up-sub" id="lvlUpSub"></div>
    <button class="lvl-up-btn" onclick="closeOv('lvlUpOv')">Huzzah!</button>
  </div>
</div>

<!-- Loot Drop overlay -->
<div class="overlay center" id="lootOv">
  <div class="ov-box dq loot-box">
    <div class="loot-icon" id="lootIcon"></div>
    <div class="loot-text">A treasure chest appears!</div>
    <div class="loot-name" id="lootName"></div>
    <div class="loot-desc" id="lootDesc"></div>
    <button class="loot-btn" onclick="closeOv('lootOv')">Claim!</button>
  </div>
</div>

<!-- Item Detail overlay -->
<div class="overlay center" id="itemOv">
  <div class="ov-box dq item-detail">
    <div class="id-icon" id="idIcon"></div>
    <div class="id-name" id="idName"></div>
    <div class="id-rarity" id="idRarity"></div>
    <div class="id-desc" id="idDesc"></div>
    <button class="id-close" onclick="closeOv('itemOv')">Close</button>
  </div>
</div>

<div class="particle-overlay" id="particleOv"></div>
<div class="toast" id="toast"></div>

const CREATURES=[{name:'Slime',svg:`<svg viewBox="0 0 100 100"><defs><radialGradient id="csg" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#6DD8FF"/><stop offset="40%" stop-color="#2EA8E0"/><stop offset="100%" stop-color="#145F8A"/></radialGradient></defs><path d="M50 6C50 6,42 18,30 32C18 46,10 58,10 68C10 82,22 95,50 95C78 95,90 82,90 68C90 58,82 46,70 32C58 18,50 6,50 6Z" fill="url(#csg)"/><ellipse cx="38" cy="62" rx="7" ry="8" fill="#fff"/><ellipse cx="39.5" cy="62.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="62" cy="62" rx="7" ry="8" fill="#fff"/><ellipse cx="63.5" cy="62.5" rx="3.5" ry="4" fill="#1A1A2E"/><path d="M38 76Q42 83,50 84Q58 83,62 76" fill="none" stroke="#0E4A6A" stroke-width="2" stroke-linecap="round"/></svg>`},{name:'Dracky',svg:`<svg viewBox="0 0 130 100"><defs><radialGradient id="cdg" cx="45%" cy="40%" r="55%"><stop offset="0%" stop-color="#5850A0"/><stop offset="100%" stop-color="#201840"/></radialGradient></defs><path d="M20 38L8 30Q3 40,10 48L18 52Z" fill="url(#cdg)"/><path d="M110 38L122 30Q127 40,120 48L112 52Z" fill="url(#cdg)"/><ellipse cx="65" cy="50" rx="26" ry="24" fill="url(#cdg)"/><ellipse cx="55" cy="46" rx="7" ry="7.5" fill="#fff"/><ellipse cx="56" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><ellipse cx="75" cy="46" rx="7" ry="7.5" fill="#fff"/><ellipse cx="76" cy="46.5" rx="3.5" ry="4" fill="#1A1A2E"/><path d="M52 60Q58 70,65 70Q72 70,78 60" fill="#C06040"/></svg>`},{name:'King Slime',svg:`<svg viewBox="0 0 100 100"><defs><radialGradient id="ckg" cx="45%" cy="40%" r="55%"><stop offset="0%" stop-color="#5CAEF0"/><stop offset="100%" stop-color="#103870"/></radialGradient><linearGradient id="ccr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE040"/><stop offset="100%" stop-color="#C89820"/></linearGradient></defs><ellipse cx="50" cy="68" rx="42" ry="28" fill="url(#ckg)"/><path d="M26 42L30 28L36 38L42 22L50 38L58 22L64 38L70 28L74 42Z" fill="url(#ccr)"/><rect x="26" y="40" width="48" height="7" rx="1" fill="url(#ccr)"/><circle cx="50" cy="43.5" r="2.8" fill="#C850C0"/><ellipse cx="40" cy="64" rx="6" ry="7" fill="#fff"/><ellipse cx="41" cy="64.5" rx="3" ry="3.8" fill="#1A1A2E"/><ellipse cx="60" cy="64" rx="6" ry="7" fill="#fff"/><ellipse cx="61" cy="64.5" rx="3" ry="3.8" fill="#1A1A2E"/><path d="M40 76Q50 82,60 76" fill="#D08070"/></svg>`}];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const SK='heros-quest-board';
let G={level:1,exp:0,gold:0,quests:[],owned:[],lootLog:[],questCompletions:{},shopCat:'monsters'};

function loadState(){try{const r=localStorage.getItem(SK);if(r)G=Object.assign(G,JSON.parse(r));}catch(e){} if(!G.questCompletions)G.questCompletions={};}
function saveState(){localStorage.setItem(SK,JSON.stringify(G));}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init(){
  loadState();resetDailyCompletions();spawnCreature();updateAll();renderQuests();renderShop();
}

function resetDailyCompletions(){
  const today=new Date().toDateString();
  if(G._lastDay!==today){G.questCompletions={};G._lastDay=today;saveState();}
}

function spawnCreature(){
  const c=CREATURES[Math.floor(Math.random()*CREATURES.length)];
  document.getElementById('creatureWrap').innerHTML=c.svg;
}

// ═══════════════════════════════════════
// UPDATE UI
// ═══════════════════════════════════════
function updateAll(){
  const cls=getClass();
  document.getElementById('hdrClass').textContent='Lv.'+G.level+' '+cls.name;
  document.getElementById('hdrLvl').textContent='Lv.'+G.level;
  const needed=expForLevel(G.level+1);
  const prev=expForLevel(G.level);
  const pct=Math.min(100,((G.exp-prev)/(needed-prev))*100);
  document.getElementById('expFill').style.width=pct+'%';
  document.getElementById('expText').textContent=G.exp+' / '+needed+' EXP';
  document.getElementById('goldAmt').textContent=G.gold+' G';
}

function getClass(){
  let cls=CLASSES[0];
  for(const c of CLASSES){if(G.level>=c.lvl)cls=c;}
  return cls;
}

// ═══════════════════════════════════════
// QUESTS
// ═══════════════════════════════════════
function renderQuests(){
  const wrap=document.getElementById('questList');
  if(!G.quests.length){wrap.innerHTML='<div style="text-align:center;padding:24px;font-size:12px;color:var(--dim)">No quests yet! Add some above.</div>';return;}
  const today=new Date().toDateString();
  let html='';
  G.quests.forEach((q,i)=>{
    const key=q.id+'_'+today;
    const count=G.questCompletions[key]||0;
    const maxed=(q.type==='daily'&&count>=1)||(q.type==='repeat'&&q.max>0&&count>=q.max);
    const checkClass=maxed?'done maxed':count>0?'done':'';
    const countText=q.type==='repeat'?(q.max>0?count+'/'+q.max:count+'×'):(count>0?'✓':'');
    html+=`<div class="quest-card dq" style="animation-delay:${i*.03}s"><div class="quest-check ${checkClass}" ${maxed?'':`onclick="completeQuest(${i})"`}>${maxed?'✓':count>0?'✓':'○'}</div><div class="quest-body"><div class="quest-name">${esc(q.name)}</div><div class="quest-meta"><span class="xp">+${q.exp} EXP</span> · <span class="gp">+${q.gold} G</span> · ${q.type==='daily'?'Once daily':'Repeatable'}</div>${countText?`<div class="quest-count">${countText}</div>`:''}</div><button class="quest-del" onclick="deleteQuest(${i})">✕</button></div>`;
  });
  wrap.innerHTML=html;
}

function showAddQuest(){openOv('addQuestOv');document.getElementById('qName').value='';document.getElementById('qName').focus();}

function saveQuest(){
  const name=document.getElementById('qName').value.trim();
  if(!name){toast('Name thy quest!');return;}
  G.quests.push({id:Date.now(),name,exp:parseInt(document.getElementById('qExp').value)||10,gold:parseInt(document.getElementById('qGold').value)||5,type:document.getElementById('qType').value,max:parseInt(document.getElementById('qMax').value)||0});
  saveState();renderQuests();closeOv('addQuestOv');toast('Quest added!');
}

function deleteQuest(i){G.quests.splice(i,1);saveState();renderQuests();}

function completeQuest(i){
  const q=G.quests[i];
  const today=new Date().toDateString();
  const key=q.id+'_'+today;
  const count=G.questCompletions[key]||0;
  if(q.type==='daily'&&count>=1)return;
  if(q.type==='repeat'&&q.max>0&&count>=q.max)return;

  G.questCompletions[key]=count+1;
  G.exp+=q.exp;
  G.gold+=q.gold;

  // Check level up
  let leveled=false;
  while(G.exp>=expForLevel(G.level+1)&&G.level<99){
    G.level++;leveled=true;
  }

  saveState();updateAll();renderQuests();

  if(leveled)showLevelUp();

  // Loot roll
  if(Math.random()<LOOT_CHANCE){
    setTimeout(()=>rollLoot(),leveled?1500:400);
  } else {
    toast('+'+q.exp+' EXP, +'+q.gold+' G');
  }
}

// ═══════════════════════════════════════
// LEVEL UP
// ═══════════════════════════════════════
function showLevelUp(){
  const cls=getClass();
  document.getElementById('lvlUpText').textContent='Level '+G.level+'!';
  document.getElementById('lvlUpClass').textContent=cls.name;
  document.getElementById('lvlUpSub').textContent='Jimmy has grown stronger!\nThe quest continues...';
  openOv('lvlUpOv');
  burstParticles();
}

function burstParticles(){
  const c=document.getElementById('particleOv');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='lvl-particle';
    const x=20+Math.random()*60;
    p.style.left=x+'%';p.style.top='50%';
    const s=3+Math.random()*5;p.style.width=s+'px';p.style.height=s+'px';
    const dx=(Math.random()-.5)*200;const dy=-100-Math.random()*200;
    p.animate([{opacity:0,transform:'translate(0,0) scale(0)'},{opacity:1,transform:`translate(${dx*.3}px,${dy*.3}px) scale(1)`,offset:.2},{opacity:.5,transform:`translate(${dx*.7}px,${dy*.7}px) scale(.8)`,offset:.7},{opacity:0,transform:`translate(${dx}px,${dy}px) scale(.2)`}],{duration:800+Math.random()*600,easing:'ease-out',fill:'forwards',delay:Math.random()*300});
    c.appendChild(p);setTimeout(()=>p.remove(),2000);
  }
}

// ═══════════════════════════════════════
// LOOT
// ═══════════════════════════════════════
function rollLoot(){
  // Weight by rarity
  const weights={common:50,uncommon:30,rare:14,epic:5,legendary:1};
  const pool=[];
  ITEMS.forEach(item=>{
    if(!G.owned.includes(item.id)){
      const w=weights[item.rarity]||1;
      for(let i=0;i<w;i++)pool.push(item);
    }
  });
  if(!pool.length)return;// All owned!

  const item=pool[Math.floor(Math.random()*pool.length)];
  G.owned.push(item.id);
  G.lootLog.unshift({itemId:item.id,date:new Date().toISOString()});
  if(G.lootLog.length>100)G.lootLog.length=100;
  saveState();

  document.getElementById('lootIcon').textContent=item.icon;
  document.getElementById('lootName').textContent=item.name;
  document.getElementById('lootName').style.color=RARITY_COLOR[item.rarity];
  document.getElementById('lootDesc').textContent=item.desc;
  openOv('lootOv');
}

// ═══════════════════════════════════════
// SHOP
// ═══════════════════════════════════════
function renderShopCats(){
  const wrap=document.getElementById('shopCats');
  wrap.innerHTML=CATS.map(c=>`<button class="shop-cat ${G.shopCat===c?'active':''}" onclick="G.shopCat='${c}';renderShop()">${c}</button>`).join('');
}

function renderShop(){
  renderShopCats();
  const wrap=document.getElementById('shopList');
  const items=ITEMS.filter(i=>i.cat===G.shopCat);
  let html='';
  items.forEach((item,i)=>{
    const owned=G.owned.includes(item.id);
    const canAfford=G.gold>=item.price;
    html+=`<div class="shop-item dq" style="animation-delay:${i*.02}s"><div class="si-icon">${item.icon}</div><div class="si-info"><div class="si-name" style="color:${RARITY_COLOR[item.rarity]}">${item.name}</div><div class="si-desc">${item.desc}</div><div class="si-rarity" style="color:${RARITY_COLOR[item.rarity]}">${item.rarity}</div></div>${owned?`<button class="si-buy owned" disabled>Owned</button>`:`<button class="si-buy" ${canAfford?`onclick="buyItem('${item.id}')"`:'disabled'}>${item.price} G</button>`}</div>`;
  });
  wrap.innerHTML=html;
}

function buyItem(id){
  const item=ITEMS.find(i=>i.id===id);
  if(!item||G.gold<item.price||G.owned.includes(id))return;
  G.gold-=item.price;
  G.owned.push(id);
  G.lootLog.unshift({itemId:id,date:new Date().toISOString(),bought:true});
  if(G.lootLog.length>100)G.lootLog.length=100;
  saveState();updateAll();renderShop();
  toast('Purchased '+item.name+'!');
}

// ═══════════════════════════════════════
// HERO TAB
// ═══════════════════════════════════════
function renderHero(){
  const totalQuests=Object.values(G.questCompletions).reduce((s,v)=>s+v,0);
  document.getElementById('heroStats').innerHTML=`
    <div class="hero-stat dq"><div class="hs-val">${G.level}</div><div class="hs-label">Level</div></div>
    <div class="hero-stat dq"><div class="hs-val">${G.exp}</div><div class="hs-label">Total EXP</div></div>
    <div class="hero-stat dq"><div class="hs-val">${G.gold} G</div><div class="hs-label">Gold</div></div>
    <div class="hero-stat dq"><div class="hs-val">${G.owned.length}/${ITEMS.length}</div><div class="hs-label">Collection</div></div>
  `;
  const wrap=document.getElementById('classList');
  wrap.innerHTML=CLASSES.map(c=>{
    const achieved=G.level>=c.lvl;
    const current=getClass().name===c.name;
    return`<div class="cp-badge ${current?'current':achieved?'achieved':''}">${c.name} (${c.lvl})</div>`;
  }).join('');
}

// ═══════════════════════════════════════
// TREASURY
// ═══════════════════════════════════════
function renderTreasury(){
  const owned=G.owned.length;
  const total=ITEMS.length;
  const byCat={};CATS.forEach(c=>byCat[c]={owned:0,total:0});
  ITEMS.forEach(i=>{byCat[i.cat].total++;if(G.owned.includes(i.id))byCat[i.cat].owned++;});

  document.getElementById('treasuryStats').innerHTML=`
    <div class="ts-pill"><div class="ts-val">${owned}/${total}</div><div class="ts-label">Collected</div></div>
    <div class="ts-pill"><div class="ts-val">${Math.round(owned/total*100)}%</div><div class="ts-label">Complete</div></div>
  `;

  const grid=document.getElementById('treasuryGrid');
  let html='';
  ITEMS.forEach((item,i)=>{
    const has=G.owned.includes(item.id);
    html+=`<div class="tg-item ${has?'owned':'empty'}" style="animation-delay:${i*.01}s" ${has?`onclick="showItemDetail('${item.id}')"`:''}>${has?item.icon:'?'}<div class="tg-rarity" style="background:${RARITY_COLOR[item.rarity]}"></div></div>`;
  });
  grid.innerHTML=html;
}

function showItemDetail(id){
  const item=ITEMS.find(i=>i.id===id);
  if(!item)return;
  document.getElementById('idIcon').textContent=item.icon;
  document.getElementById('idName').textContent=item.name;
  document.getElementById('idRarity').textContent=item.rarity;
  document.getElementById('idRarity').style.color=RARITY_COLOR[item.rarity];
  document.getElementById('idDesc').textContent=item.desc;
  openOv('itemOv');
}

// ═══════════════════════════════════════
// LOOT LOG
// ═══════════════════════════════════════
function renderLootLog(){
  const wrap=document.getElementById('lootLogList');
  if(!G.lootLog.length){wrap.innerHTML='<div style="text-align:center;padding:24px;font-size:12px;color:var(--dim)">No loot yet. Complete quests!</div>';return;}
  let html='';
  G.lootLog.slice(0,50).forEach((entry,i)=>{
    const item=ITEMS.find(x=>x.id===entry.itemId);
    if(!item)return;
    const d=new Date(entry.date);
    const dateStr=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const verb=entry.bought?'Purchased':'Found';
    html+=`<div class="loot-entry dq" style="animation-delay:${i*.02}s"><div class="le-icon">${item.icon}</div><div class="le-text">${verb} <span class="hl">${item.name}</span></div><div class="le-date">${dateStr}</div></div>`;
  });
  wrap.innerHTML=html;
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function showTab(t){
  ['Quests','Hero','Shop','Treasury','Lootlog'].forEach(n=>{
    document.getElementById('sec'+n).classList.add('hidden');
    document.getElementById('nav'+n).classList.remove('active');
  });
  const cap=t.charAt(0).toUpperCase()+t.slice(1);
  document.getElementById('sec'+cap).classList.remove('hidden');
  document.getElementById('nav'+cap).classList.add('active');
  if(t==='hero')renderHero();
  if(t==='shop')renderShop();
  if(t==='treasury')renderTreasury();
  if(t==='lootlog')renderLootLog();
}

// ═══════════════════════════════════════
// OVERLAYS & HELPERS
// ═══════════════════════════════════════
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function exportJSON(){
  if(!G.quests.length&&!G.owned.length){toast('Nothing to export');return;}
  const b=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='heros-quest-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);
  toast('Exported!');
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){try{const imp=JSON.parse(e.target.result);G=Object.assign(G,imp);saveState();updateAll();renderQuests();renderShop();toast('Data loaded!');}catch(err){toast('Import failed');}};
  reader.readAsText(file);event.target.value='';
}

init();
</script>
