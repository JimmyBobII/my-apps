<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101848">
<title>Slime Dress-Up</title>
<style>
:root{
  --bg:#101848;--bg2:#0c1240;--border-o:#f8f0e0;--border-i:#c8b878;--border-d:#485090;
  --text:#f8f8f8;--dim:#a0a8d0;--gold:#f8d848;--blue:#68c0f8;--green:#68e868;--red:#f87070;
  --gg:rgba(248,216,72,0.12);--font:'Courier New','Courier',monospace;
  --common:#b0b8d0;--uncommon:#68e868;--rare:#68c0f8;--epic:#d088f8;--legendary:#f8d848;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--text);font-family:var(--font);max-width:480px;margin:0 auto;padding:0 0 60px;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.dq{position:relative;background:linear-gradient(180deg,#182058,#101848);border:3px solid var(--border-o);border-radius:10px;padding:14px;box-shadow:inset 0 0 0 2px var(--border-d),0 4px 16px rgba(0,0,0,.3)}
.dq::before{content:'';position:absolute;inset:2px;border:1px solid var(--border-i);border-radius:7px;pointer-events:none}

/* Header */
.header{text-align:center;padding:20px 16px 8px}
.header h1{font-size:20px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 12px rgba(248,216,72,.3);text-transform:uppercase}
.header .sub{font-size:11px;color:var(--dim);margin-top:4px}

/* Slime Stage */
.stage{position:relative;width:100%;height:280px;display:flex;align-items:center;justify-content:center;margin:0 0 8px}

.slime-display{position:relative;width:200px;height:200px}
.slime-display svg{position:absolute;top:0;left:0;width:100%;height:100%}
.slime-base{z-index:1}
.slime-armour-layer{z-index:2}
.slime-helm-layer{z-index:3}
.slime-weapon-layer{z-index:4}
.slime-accessory-layer{z-index:5}
.slime-eyes-layer{z-index:6}

/* Slime bounce */
.slime-display{animation:slimeBounce 2.5s ease-in-out infinite}
@keyframes slimeBounce{0%,100%{transform:translateY(0) scaleY(1) scaleX(1)}30%{transform:translateY(-8px) scaleY(1.04) scaleX(.97)}50%{transform:translateY(0) scaleY(.94) scaleX(1.04)}70%{transform:translateY(-3px) scaleY(1.02) scaleX(.99)}}

.slime-shadow{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);width:120px;height:16px;background:radial-gradient(ellipse,rgba(0,0,0,.3) 0%,transparent 70%);z-index:0}

/* Equip slots */
.equip-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 16px 12px}

.equip-slot{text-align:center;cursor:pointer;padding:10px 4px;border:2px solid var(--border-d);border-radius:8px;background:rgba(0,0,0,.15);transition:all .15s}
.equip-slot:active{border-color:var(--border-i);background:var(--gg)}
.es-icon{font-size:24px;margin-bottom:2px}
.es-label{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.es-name{font-size:9px;color:var(--gold);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.es-empty{color:var(--dim)}

/* Pick overlay */
.pick-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.pick-overlay.open{opacity:1;pointer-events:auto}
.pick-box{max-width:440px;width:100%;max-height:70vh;display:flex;flex-direction:column;padding:0}
.pick-header{padding:14px 14px 10px;border-bottom:1px solid var(--border-d);display:flex;justify-content:space-between;align-items:center}
.pick-title{font-size:13px;font-weight:bold;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.pick-close{padding:4px 12px;border:1px solid var(--border-d);border-radius:4px;background:transparent;color:var(--dim);font-family:var(--font);font-size:11px;cursor:pointer}
.pick-list{overflow-y:auto;flex:1;padding:8px 14px 14px}
.pick-item{display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:6px;border:2px solid var(--border-d);border-radius:6px;background:rgba(0,0,0,.1);cursor:pointer;transition:all .15s}
.pick-item:active{border-color:var(--border-i);background:var(--gg)}
.pick-item.equipped{border-color:var(--gold);background:var(--gg)}
.pi-icon{font-size:22px;flex-shrink:0}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:12px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-desc{font-size:9px;color:var(--dim);margin-top:1px}
.pi-rarity{font-size:8px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px}
.pick-none{padding:10px;margin-bottom:6px;border:2px dashed var(--border-d);border-radius:6px;text-align:center;cursor:pointer;font-size:11px;color:var(--dim)}
.pick-none:active{border-color:var(--border-i);color:var(--gold)}

.pick-empty{text-align:center;padding:30px;font-size:12px;color:var(--dim)}

/* Info bar */
.info-bar{padding:0 16px;margin-bottom:10px}
.info-text{font-size:11px;color:var(--dim);text-align:center;line-height:1.5}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:linear-gradient(180deg,#182058,#101848);border:2px solid var(--border-o);color:var(--gold);padding:8px 18px;border-radius:4px;font-family:var(--font);font-size:12px;font-weight:bold;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <h1>Slime Dress-Up</h1>
  <div class="sub">Equip thy treasures!</div>
</div>

<!-- Slime Stage -->
<div class="stage">
  <div class="slime-shadow"></div>
  <div class="slime-display" id="slimeDisplay">

    <svg class="slime-base" viewBox="0 0 200 200">

        <radialGradient id="sbg" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#6DD8FF"/>

          <stop offset="75%" stop-color="#1B7CB8"/>
          <stop offset="100%" stop-color="#145F8A"/>
        </radialGradient>
        <radialGradient id="ssp" cx="35%" cy="25%" r="30%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <!-- Body -->
      <path d="M100 12C100 12,84 36,60 64C36 92,20 116,20 136C20 164,44 190,100 190C156 190,180 164,180 136C180 116,164 92,140 64C116 36,100 12,100 12Z" fill="url(#sbg)" stroke="#0E5A80" stroke-width="2"/>
      <!-- Specular -->
      <path d="M100 16C100 16,84 40,64 66C44 92,28 116,28 136C28 156,40 172,68 180C40 164,32 144,40 120C48 96,72 60,100 16Z" fill="url(#ssp)"/>
      <ellipse cx="68" cy="64" rx="12" ry="16" fill="rgba(255,255,255,0.15)" transform="rotate(-20,68,64)"/>
    </svg>

    <!-- Armour overlay layer -->
    <svg class="slime-armour-layer" viewBox="0 0 200 200" id="armourLayer"></svg>

    <!-- Eyes (always on top of armour) -->
    <svg class="slime-eyes-layer" viewBox="0 0 200 200">
      <ellipse cx="76" cy="124" rx="15" ry="17" fill="#fff" stroke="#0E5A80" stroke-width="1"/>
      <ellipse cx="79" cy="125" rx="7.6" ry="9" fill="#1A1A2E"/>
      <ellipse cx="81" cy="122" rx="3" ry="3.6" fill="#fff"/>
      <ellipse cx="124" cy="124" rx="15" ry="17" fill="#fff" stroke="#0E5A80" stroke-width="1"/>
      <ellipse cx="127" cy="125" rx="7.6" ry="9" fill="#1A1A2E"/>
      <ellipse cx="129" cy="122" rx="3" ry="3.6" fill="#fff"/>
      <!-- Mouth -->
      <path d="M76 152Q84 166,100 168Q116 166,124 152" fill="none" stroke="#0E4A6A" stroke-width="3.5" stroke-linecap="round"/>
    </svg>

    <!-- Helm layer -->
    <svg class="slime-helm-layer" viewBox="0 0 200 200" id="helmLayer"></svg>

    <!-- Weapon layer -->
    <svg class="slime-weapon-layer" viewBox="0 0 200 200" id="weaponLayer"></svg>

    <!-- Accessory layer (glow/aura) -->
    <svg class="slime-accessory-layer" viewBox="0 0 200 200" id="accessoryLayer"></svg>
  </div>
</div>

<!-- Equip Slots -->
<div class="equip-slots">
  <div class="equip-slot" onclick="openPicker('weapon')">
    <div class="es-icon" id="slotWeaponIcon">⚔️</div>
    <div class="es-label">Weapon</div>
    <div class="es-name" id="slotWeaponName"><span class="es-empty">None</span></div>
  </div>
  <div class="equip-slot" onclick="openPicker('helm')">
    <div class="es-icon" id="slotHelmIcon">⛑️</div>
    <div class="es-label">Helm</div>
    <div class="es-name" id="slotHelmName"><span class="es-empty">None</span></div>
  </div>
  <div class="equip-slot" onclick="openPicker('armour')">
    <div class="es-icon" id="slotArmourIcon">🛡️</div>
    <div class="es-label">Armour</div>
    <div class="es-name" id="slotArmourName"><span class="es-empty">None</span></div>
  </div>
  <div class="equip-slot" onclick="openPicker('accessory')">
    <div class="es-icon" id="slotAccessoryIcon">💍</div>
    <div class="es-label">Accessory</div>
    <div class="es-name" id="slotAccessoryName"><span class="es-empty">None</span></div>
  </div>
</div>

<div class="info-bar">
  <div class="info-text">Tap a slot to equip items from thy Quest Board collection.<br>Gear up and look glorious!</div>
</div>

<!-- Picker overlay -->
<div class="pick-overlay" id="pickOverlay">
  <div class="pick-box dq">
    <div class="pick-header">
      <div class="pick-title" id="pickTitle">Choose Weapon</div>
      <button class="pick-close" onclick="closePicker()">Close</button>
    </div>
    <div class="pick-list" id="pickList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ═══ STATE ═══
let equip={weapon:null,helm:null,armour:null,accessory:null};
let ownedItems=[];
let currentSlot=null;

function loadEquip(){
  try{const r=localStorage.getItem(EQUIP_SK);if(r)equip=JSON.parse(r);}catch(e){}
}
function saveEquip(){localStorage.setItem(EQUIP_SK,JSON.stringify(equip));}

function loadOwned(){
  try{
    const r=localStorage.getItem(QUEST_SK);
    if(r){const g=JSON.parse(r);ownedItems=g.owned||[];}
  }catch(e){}
}

function init(){
  loadOwned();
  loadEquip();
  updateSlime();
  updateSlots();
}

// ═══ SLIME RENDERING ═══
function updateSlime(){
  // Weapon
  const wl=document.getElementById('weaponLayer');
  wl.innerHTML=equip.weapon&&WEAPON_SVG[equip.weapon]?WEAPON_SVG[equip.weapon]:'';

  // Helm
  const hl=document.getElementById('helmLayer');
  hl.innerHTML=equip.helm&&HELM_SVG[equip.helm]?HELM_SVG[equip.helm]:'';

  // Armour
  const al=document.getElementById('armourLayer');
  al.innerHTML=equip.armour&&ARMOUR_SVG[equip.armour]?ARMOUR_SVG[equip.armour]:'';

  // Accessory
  const xl=document.getElementById('accessoryLayer');
  xl.innerHTML=equip.accessory&&ACCESSORY_SVG[equip.accessory]?ACCESSORY_SVG[equip.accessory]:'';
}

function updateSlots(){
  ['weapon','helm','armour','accessory'].forEach(slot=>{
    const id=equip[slot];
    const item=id?ALL_ITEMS.find(i=>i.id===id):null;
    const iconEl=document.getElementById('slot'+cap(slot)+'Icon');
    const nameEl=document.getElementById('slot'+cap(slot)+'Name');
    if(item){
      iconEl.textContent=item.icon;
      nameEl.innerHTML=`<span style="color:${RC[item.rarity]}">${item.name}</span>`;
    }else{
      iconEl.textContent={weapon:'⚔️',helm:'⛑️',armour:'🛡️',accessory:'💍'}[slot];
      nameEl.innerHTML='<span class="es-empty">None</span>';
    }
  });
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ═══ PICKER ═══
function openPicker(slot){
  currentSlot=slot;
  document.getElementById('pickTitle').textContent='Choose '+cap(slot);

  // Get available items for this slot
  let pool=[];
  if(slot==='weapon')pool=ALL_ITEMS.filter(i=>i.cat==='weapons');
  else if(slot==='helm')pool=ALL_ITEMS.filter(i=>HELM_IDS.includes(i.id));
  else if(slot==='armour')pool=ALL_ITEMS.filter(i=>BODY_IDS.includes(i.id));
  else if(slot==='accessory')pool=ALL_ITEMS.filter(i=>ACCESSORY_IDS.includes(i.id));

  // Filter to owned only
  const available=pool.filter(i=>ownedItems.includes(i.id));

  const list=document.getElementById('pickList');
  if(!available.length&&!equip[slot]){
    list.innerHTML='<div class="pick-empty">No items owned yet!<br>Complete quests and visit the shop.</div>';
  }else{
    let html='<div class="pick-none" onclick="unequip()">✕ Unequip</div>';
    available.forEach(item=>{
      const equipped=equip[slot]===item.id;
      html+=`<div class="pick-item ${equipped?'equipped':''}" onclick="equipItem('${item.id}')"><div class="pi-icon">${item.icon}</div><div class="pi-info"><div class="pi-name" style="color:${RC[item.rarity]}">${item.name}</div><div class="pi-rarity" style="color:${RC[item.rarity]}">${item.rarity}</div></div></div>`;
    });
    list.innerHTML=html;
  }

  document.getElementById('pickOverlay').classList.add('open');
}

function closePicker(){document.getElementById('pickOverlay').classList.remove('open');currentSlot=null;}

function equipItem(id){
  if(!currentSlot)return;
  equip[currentSlot]=id;
  saveEquip();
  updateSlime();
  updateSlots();
  closePicker();
  const item=ALL_ITEMS.find(i=>i.id===id);
  toast('Equipped '+item.name+'!');
}

function unequip(){
  if(!currentSlot)return;
  equip[currentSlot]=null;
  saveEquip();
  updateSlime();
  updateSlots();
  closePicker();
  toast('Unequipped!');
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
